<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Chatrix | Real‑time Chat</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2300d4ff'%3E%3Cpath d='M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V4c0-1.1-.9-2-2-2z'/%3E%3C/svg%3E"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        background: #000;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      body.light-theme {
        background: #e0e0e0;
      }
      body.light-theme .phone {
        background: #ffffff;
      }
      body.light-theme .friend-item,
      body.light-theme .group-item,
      body.light-theme .hub-item,
      body.light-theme .header,
      body.light-theme .chapter-card,
      body.light-theme .request-item {
        background: #f5f5f5;
      }
      body.light-theme .friend-name,
      body.light-theme .hub-name {
        color: #1a1a1a;
      }
      body.light-theme .chat-messages {
        background: #fafafa;
      }
      body.light-theme .message-received {
        background: #e4e6eb;
        color: #050505;
      }
      .phone {
        width: 375px;
        height: 700px;
        background: #0a0a0a;
        border-radius: 40px;
        overflow: hidden;
        position: relative;
        box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
      }
      .tabs {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        display: flex;
        background: #121212;
        border-top: 1px solid #333;
        z-index: 10;
      }
      .tab {
        flex: 1;
        text-align: center;
        padding: 12px;
        color: #888;
        font-size: 20px;
        cursor: pointer;
        position: relative;
      }
      .tab.active {
        color: #00d4ff;
        border-top: 2px solid #00d4ff;
        background: #1a1a1a;
      }
      .tab span {
        font-size: 11px;
        display: block;
      }
      .tab-badge {
        position: absolute;
        top: 4px;
        right: 20px;
        background: #ff3b30;
        color: white;
        border-radius: 12px;
        padding: 2px 6px;
        font-size: 10px;
        min-width: 18px;
      }
      .screen {
        height: calc(100% - 50px);
        overflow-y: auto;
        display: none;
        padding: 16px;
      }
      .screen.active {
        display: block;
      }
      .header {
        background: #121212;
        padding: 16px;
        border-radius: 20px;
        margin-bottom: 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }
      .header-left {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 1;
      }
      .header-right {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .app-logo {
        width: 36px;
        height: 36px;
        background: #00d4ff;
        border-radius: 50% 50% 45% 45%;
        position: relative;
        animation: float 2s ease-in-out infinite;
      }
      .app-logo .eyes {
        position: absolute;
        top: 10px;
        left: 7px;
        right: 7px;
        display: flex;
        justify-content: space-between;
      }
      .app-logo .eyes span {
        width: 8px;
        height: 8px;
        background: #0a0a0a;
        border-radius: 50%;
      }
      .app-logo .mouth {
        position: absolute;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        width: 10px;
        height: 5px;
        background: #0a0a0a;
        border-radius: 0 0 8px 8px;
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-3px);
        }
      }
      .logo-text {
        font-size: 22px;
        font-weight: bold;
        background: linear-gradient(135deg, #00d4ff, #0088ff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .user-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: #1a2a3a;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        color: #00d4ff;
        overflow: hidden;
        background-size: cover;
        cursor: pointer;
      }
      .icon-btn,
      .exit-btn {
        background: rgba(0, 212, 255, 0.2);
        border: 1px solid #00d4ff;
        color: #00d4ff;
        padding: 6px 10px;
        border-radius: 20px;
        font-size: 12px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        text-decoration: none;
      }
      .download-btn,
      .video-call-btn {
        background: #00d4ff;
        color: black;
        border: none;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 12px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        text-decoration: none;
        font-weight: bold;
      }
      .exit-btn {
        background: rgba(255, 60, 60, 0.3);
        border: none;
        color: white;
      }
      .add-friend,
      .new-chapter {
        background: rgba(0, 212, 255, 0.15);
        border: 1px solid #00d4ff;
        color: #00d4ff;
        padding: 10px;
        border-radius: 30px;
        width: 100%;
        margin-bottom: 12px;
        cursor: pointer;
        text-align: center;
      }
      .new-chapter {
        background: #00d4ff;
        color: black;
        font-weight: bold;
      }
      .prompt-box {
        background: linear-gradient(135deg, #00d4ff22, #0088ff22);
        border-radius: 20px;
        padding: 20px;
        text-align: center;
        margin-bottom: 16px;
        border: 1px solid #00d4ff44;
      }
      .friend-item,
      .group-item,
      .hub-item,
      .request-item,
      .leaderboard-item,
      .winner-card {
        display: flex;
        align-items: center;
        padding: 12px;
        background: #121212;
        margin-bottom: 8px;
        border-radius: 16px;
        cursor: pointer;
        position: relative;
      }
      .friend-avatar,
      .group-avatar,
      .hub-avatar,
      .request-avatar {
        width: 50px;
        height: 50px;
        background: #1a2a3a;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        margin-right: 12px;
        overflow: hidden;
        background-size: cover;
      }
      .friend-name {
        color: white;
        font-weight: bold;
      }
      .friend-preview {
        color: #888;
        font-size: 12px;
        margin-top: 4px;
      }
      .notification-badge {
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        background: #ff3b30;
        color: white;
        border-radius: 12px;
        padding: 2px 8px;
        font-size: 11px;
      }
      .tier-badge {
        background: linear-gradient(135deg, #ffd700, #ff8c00);
        color: #000;
        font-weight: bold;
        padding: 2px 8px;
        border-radius: 20px;
        font-size: 11px;
        margin-left: 8px;
      }
      .leaderboard-rank {
        font-weight: bold;
        font-size: 18px;
        margin-right: 12px;
        color: #ffd700;
        min-width: 30px;
      }
      .chat-view {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0a0a0a;
        z-index: 20;
        transform: translateX(100%);
        transition: 0.3s;
        display: flex;
        flex-direction: column;
      }
      .chat-view.open {
        transform: translateX(0);
      }
      .chat-header {
        background: #00d4ff;
        padding: 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        color: black;
        font-weight: bold;
      }
      .chat-header-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .chat-header-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        overflow: hidden;
        background-size: cover;
      }
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .message-bubble {
        max-width: 80%;
        padding: 8px 12px;
        border-radius: 20px;
        word-break: break-word;
      }
      .message-sent {
        background: #00d4ff;
        color: black;
        align-self: flex-end;
      }
      .message-received {
        background: #2c2c2e;
        color: white;
        align-self: flex-start;
      }
      .message-time {
        font-size: 10px;
        opacity: 0.7;
        margin-top: 4px;
      }
      .media-preview {
        max-width: 200px;
        max-height: 200px;
        border-radius: 12px;
        cursor: pointer;
        margin-top: 5px;
      }
      .file-message {
        background: rgba(0, 212, 255, 0.2);
        padding: 8px 12px;
        border-radius: 12px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .voice-message {
        background: rgba(0, 212, 255, 0.2);
        padding: 8px 12px;
        border-radius: 20px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .chat-input {
        display: flex;
        padding: 12px;
        gap: 8px;
        background: #1c1c1e;
        border-top: 1px solid #333;
        flex-wrap: wrap;
      }
      .chat-input input {
        flex: 1;
        background: #2c2c2e;
        border: none;
        border-radius: 25px;
        padding: 10px;
        color: white;
        outline: none;
      }
      .chat-input button {
        background: #00d4ff;
        border: none;
        border-radius: 25px;
        padding: 10px 18px;
        font-weight: bold;
        cursor: pointer;
        color: black;
      }
      .attach-btn,
      .tag-btn,
      .emoji-btn,
      .voice-record-btn {
        background: #2c2c2e;
        border: none;
        border-radius: 25px;
        padding: 10px 14px;
        color: white;
        cursor: pointer;
      }
      .emoji-picker,
      .tag-search-popup,
      .attach-menu {
        position: absolute;
        bottom: 70px;
        left: 12px;
        background: #1c1c1e;
        border-radius: 20px;
        padding: 12px;
        z-index: 40;
        border: 1px solid #00d4ff55;
        display: none;
      }
      .emoji-picker.show {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 8px;
        max-width: 300px;
        max-height: 200px;
        overflow-y: auto;
      }
      .tag-search-popup.show {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-width: 200px;
      }
      .attach-menu.show {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        min-width: 200px;
      }
      .tag-search-input {
        width: 100%;
        padding: 8px;
        border-radius: 20px;
        border: none;
        background: #2c2c2e;
        color: white;
        outline: none;
      }
      .tag-friend-item {
        padding: 8px 12px;
        cursor: pointer;
        border-radius: 10px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .tag-friend-item:hover {
        background: #00d4ff33;
      }
      .emoji-option {
        background: #1c1c1e;
        border: none;
        border-radius: 40px;
        padding: 8px;
        cursor: pointer;
        font-size: 20px;
      }
      .chapter-card {
        background: #1a1a1a;
        border-radius: 20px;
        padding: 16px;
        margin-bottom: 16px;
        border-left: 4px solid #00d4ff;
        cursor: pointer;
        position: relative;
      }
      .chapter-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }
      .chapter-avatar {
        width: 40px;
        height: 40px;
        background: #1a2a3a;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
      }
      .chapter-user {
        font-weight: bold;
        color: white;
      }
      .chapter-time {
        font-size: 10px;
        color: #888;
      }
      .chapter-text {
        color: #ccc;
        font-size: 14px;
        margin-top: 8px;
      }
      .chapter-stats {
        display: flex;
        gap: 16px;
        margin-top: 12px;
        font-size: 13px;
        color: #888;
      }
      .like-btn {
        background: none;
        border: none;
        color: #888;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .like-btn.liked {
        color: #ff4466;
      }
      .delete-chapter {
        position: absolute;
        top: 12px;
        right: 12px;
        background: rgba(255, 60, 60, 0.3);
        border: none;
        color: #ff6666;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 11px;
        cursor: pointer;
      }
      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .modal-card {
        background: #1c1c1e;
        border-radius: 30px;
        padding: 24px;
        width: 90%;
        text-align: center;
        border: 1px solid #00d4ff;
        max-height: 80%;
        overflow-y: auto;
      }
      .modal-card input,
      .modal-card textarea,
      .modal-card select {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        background: #2c2c2e;
        border: none;
        border-radius: 30px;
        color: white;
      }
      .modal-card button {
        background: #00d4ff;
        border: none;
        border-radius: 30px;
        padding: 12px;
        width: 100%;
        margin-top: 8px;
        font-weight: bold;
        cursor: pointer;
        color: black;
      }
      .modal-card .danger-button {
        background: #ff4444;
        color: white;
      }
      .member-checkbox {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px;
        border-bottom: 0.5px solid #333;
      }
      .link {
        color: #00d4ff;
        margin-top: 12px;
        cursor: pointer;
        font-size: 12px;
      }
      .hidden {
        display: none !important;
      }
      .empty {
        text-align: center;
        color: #666;
        padding: 40px;
      }
      .small-btn {
        background: rgba(0, 212, 255, 0.15);
        border: 1px solid #00d4ff;
        color: #00d4ff;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 11px;
        cursor: pointer;
        margin-left: 8px;
      }
      .profile-pic {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: #1a2a3a;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
        margin: 0 auto 12px;
        overflow: hidden;
        background-size: cover;
      }
      .mention {
        color: #00d4ff;
        font-weight: bold;
        cursor: pointer;
        text-decoration: underline;
      }
      .section-title {
        color: #00d4ff;
        margin: 16px 0 8px 0;
        font-size: 14px;
      }
      .winner-trophy {
        font-size: 24px;
        margin-right: 12px;
      }
      .leaderboard-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 12px;
        padding: 8px;
        background: #1a1a1a;
        border-radius: 16px;
        color: #00d4ff;
        font-weight: bold;
      }
      .recording-active {
        background: #ff4444 !important;
        color: white !important;
        animation: pulse 1s infinite;
      }
      @keyframes pulse {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.6;
        }
        100% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="phone">
      <div class="tabs">
        <div
          class="tab active"
          data-tab="chats"
          onclick="window.showScreen('chats')"
        >
          <i class="fas fa-comment-dots"></i><span>Chats</span
          ><span id="chatsTabBadge" class="tab-badge hidden">0</span>
        </div>
        <div
          class="tab"
          data-tab="groups"
          onclick="window.showScreen('groups')"
        >
          <i class="fas fa-users"></i><span>Groups</span
          ><span id="groupsTabBadge" class="tab-badge hidden">0</span>
        </div>
        <div class="tab" data-tab="hubs" onclick="window.showScreen('hubs')">
          <i class="fas fa-layer-group"></i><span>Hubs</span
          ><span id="hubsTabBadge" class="tab-badge hidden">0</span>
        </div>
        <div
          class="tab"
          data-tab="chapters"
          onclick="window.showScreen('chapters')"
        >
          <i class="fas fa-book-open"></i><span>Chapters</span
          ><span id="chaptersTabBadge" class="tab-badge hidden">0</span>
        </div>
        <div
          class="tab"
          data-tab="leaderboard"
          onclick="window.showScreen('leaderboard')"
        >
          <i class="fas fa-trophy"></i><span>Tiers</span>
        </div>
        <div
          class="tab"
          data-tab="winners"
          onclick="window.showScreen('winners')"
        >
          <i class="fas fa-crown"></i><span>Winners</span>
        </div>
      </div>

      <div id="chatsScreen" class="screen active">
        <div class="header">
          <div class="header-left">
            <div class="app-logo">
              <div class="eyes"><span></span><span></span></div>
              <div class="mouth"></div>
            </div>
            <div class="logo-text">Chatrix</div>
            <div class="user-avatar" id="currentUserAvatar">👤</div>
          </div>
          <div class="header-right">
            <a
              href="https://web2apk.online/build_app.php?weburl=https%3A%2F%2Fchatrixs.vercel.app%2F"
              class="download-btn"
              target="_blank"
              ><i class="fas fa-download"></i> Download App</a
            >
            <a
              href="https://chatrixscall.vercel.app/"
              class="video-call-btn"
              target="_blank"
              ><i class="fas fa-video"></i> Video Call</a
            >
            <button class="icon-btn" id="themeBtn">
              <i class="fas fa-sun"></i>
            </button>
            <button class="icon-btn" id="editProfileBtn">
              <i class="fas fa-user-edit"></i>
            </button>
            <button class="exit-btn" id="logoutBtn">Exit</button>
          </div>
        </div>
        <button class="add-friend" id="addFriendBtn">+ Add Friend</button>
        <div id="pendingRequestsSection"></div>
        <div id="friendsList"></div>
      </div>

      <div id="groupsScreen" class="screen">
        <div class="header">
          <div class="app-logo">
            <div class="eyes"><span></span><span></span></div>
            <div class="mouth"></div>
          </div>
          <div class="logo-text">Groups</div>
          <div></div>
        </div>
        <button class="add-friend" id="createGroupBtn">+ Create Group</button>
        <div id="groupsList"></div>
      </div>

      <div id="hubsScreen" class="screen">
        <div class="header">
          <div class="app-logo">
            <div class="eyes"><span></span><span></span></div>
            <div class="mouth"></div>
          </div>
          <div class="logo-text">Hubs</div>
          <div></div>
        </div>
        <button class="add-friend" id="createHubBtn">+ Create Hub</button>
        <div id="hubsList"></div>
      </div>

      <div id="chaptersScreen" class="screen">
        <div class="header">
          <div class="app-logo">
            <div class="eyes"><span></span><span></span></div>
            <div class="mouth"></div>
          </div>
          <div class="logo-text">Chapters</div>
          <div></div>
        </div>
        <div class="prompt-box">
          <p>📖 Post a chapter daily to increase your TIER!</p>
          <button class="new-chapter" id="newChapterBtn">+ New Chapter</button>
        </div>
        <div id="chaptersList"></div>
      </div>

      <div id="leaderboardScreen" class="screen">
        <div class="header">
          <div class="app-logo">
            <div class="eyes"><span></span><span></span></div>
            <div class="mouth"></div>
          </div>
          <div class="logo-text">Tier Leaderboard</div>
          <div></div>
        </div>
        <div id="leaderboardList"></div>
      </div>

      <div id="winnersScreen" class="screen">
        <div class="header">
          <div class="app-logo">
            <div class="eyes"><span></span><span></span></div>
            <div class="mouth"></div>
          </div>
          <div class="logo-text">🏆 Chat Leaders</div>
          <div></div>
        </div>
        <div id="weeklyWinnerBox" class="winner-card"></div>
        <div id="monthlyWinnerBox" class="winner-card"></div>
      </div>

      <div id="chatView" class="chat-view">
        <div class="chat-header">
          <div class="chat-header-left" id="closeChatBtn">
            <i class="fas fa-arrow-left"></i>
            <div class="chat-header-avatar" id="chatHeaderAvatar">👤</div>
            <span id="chatHeaderName">Back</span>
          </div>
        </div>
        <div id="chatMessages" class="chat-messages"></div>
        <div class="chat-input">
          <input
            type="text"
            id="messageInput"
            placeholder="Type a message..."
          />

        // ---------- STORAGE ----------
        function saveAll() {
          localStorage.setItem("chatrix_users", JSON.stringify(users));
          localStorage.setItem("chatrix_messages", JSON.stringify(messages));
          localStorage.setItem("chatrix_chapters", JSON.stringify(chapters));
          localStorage.setItem("chatrix_hubs", JSON.stringify(hubs));
          localStorage.setItem(
            "chatrix_profiles",
            JSON.stringify(userProfiles),
          );
          localStorage.setItem("chatrix_groups", JSON.stringify(groups));
          localStorage.setItem(
            "chatrix_groupChats",
            JSON.stringify(groupChats),
          );
          localStorage.setItem(
            "chatrix_friendRequests",
            JSON.stringify(friendRequests),
          );
          localStorage.setItem("chatrix_userTiers", JSON.stringify(userTiers));
        }

        function loadAll() {
          let saved = localStorage.getItem("chatrix_users");
          if (saved) {
            users = JSON.parse(saved);
          } else {
            users = {
              alex: {
                pass: btoa("alex123"),
                friends: ["jasmine"],
                displayName: "Alex",
              },
              jasmine: {
                pass: btoa("jasmine123"),
                friends: ["alex"],
                displayName: "Jasmine",
              },
            };
            saveAll();
          }
          messages = JSON.parse(
            localStorage.getItem("chatrix_messages") || "{}",
          );
          chapters = JSON.parse(
            localStorage.getItem("chatrix_chapters") || "[]",
          );
          hubs = JSON.parse(localStorage.getItem("chatrix_hubs") || "[]");
          userProfiles = JSON.parse(
            localStorage.getItem("chatrix_profiles") || "{}",
          );
          groups = JSON.parse(localStorage.getItem("chatrix_groups") || "[]");
          groupChats = JSON.parse(
            localStorage.getItem("chatrix_groupChats") || "{}",
          );
          friendRequests = JSON.parse(
            localStorage.getItem("chatrix_friendRequests") || "{}",
          );
          userTiers = JSON.parse(
            localStorage.getItem("chatrix_userTiers") || "{}",
          );

          Object.keys(users).forEach((u) => {
            if (!users[u].displayName) users[u].displayName = u;
            if (!users[u].friends) users[u].friends = [];
            if (!userTiers[u]) userTiers[u] = { tier: 0, lastPostDate: null };
          });
        }

        // ---------- HELPERS ----------
        function escapeHtml(str) {
          if (!str) return "";
          return String(str).replace(/[&<>]/g, (m) =>
            m === "&" ? "&amp;" : m === "<" ? "&lt;" : "&gt;",
          );
        }

        function getFriends(u) {
          return users[u]?.friends || [];
        }
        function getTierName(tier) {
          if (tier >= 50) return "🏆 LEGEND";
          if (tier >= 30) return "💎 MASTER";
          if (tier >= 20) return "🥇 ELITE";
          if (tier >= 10) return "🥈 ADVANCED";
          if (tier >= 5) return "🥉 NOVICE";
          if (tier >= 1) return "🌱 BEGINNER";
          return "📘 ROOKIE";
        }

        // ---------- UI REFRESH (REAL TIME) ----------
        function refreshUI() {
          if (!currentUser) return;
          // Reload all data from localStorage to catch changes from other windows/tabs
          loadAll();
          renderFriends();
          renderPendingRequests();
          renderGroups();
          renderHubs();
          renderChapters();
          renderLeaderboard();
          renderWinners();
          if (currentChatId && currentChatType === "friend")
            renderMessages(currentChatId);
          else if (currentChatId && currentChatType === "group")
            renderGroupMessages(currentChatId);
          else if (currentChatId && currentChatType === "hub")
            renderHubMessages(currentChatId);
          updateBadges();
        }

        function updateBadges() {
          let unread = 0;
          if (messages[currentUser]) {
            for (let f in messages[currentUser]) {
              unread += messages[currentUser][f].filter(
                (m) => m.from === f && !m.read,
              ).length;
            }
          }
          let badge = document.getElementById("chatsTabBadge");
          if (badge) {
            badge.innerHTML = unread;
            badge.classList.toggle("hidden", unread === 0);
          }
          let chaptersNew = chapters.filter(
            (c) =>
              getFriends(currentUser).includes(c.user) &&
              !c.viewedBy?.includes(currentUser),
          ).length;
          let chapBadge = document.getElementById("chaptersTabBadge");
          if (chapBadge) {
            chapBadge.innerHTML = chaptersNew;
            chapBadge.classList.toggle("hidden", chaptersNew === 0);
          }
        }

        // ---------- SCREENS ----------
        window.showScreen = function (screen) {
          document
            .querySelectorAll(".screen")
            .forEach((s) => s.classList.remove("active"));
          let target = document.getElementById(screen + "Screen");
          if (target) target.classList.add("active");
          document.querySelectorAll(".tab").forEach((tab) => {
            tab.classList.remove("active");
            if (tab.getAttribute("data-tab") === screen)
              tab.classList.add("active");
          });
          refreshUI();
        };

        // ---------- FRIENDS & CHAT (WITH MEDIA & VOICE) ----------
        function renderMediaMessage(msg) {
          if (msg.type === "image") {
            return `<div><img src="${msg.data}" class="media-preview" onclick="window.showImagePreview('${msg.data}')"></div>`;
          } else if (msg.type === "video") {
            return `<div><video controls class="media-preview"><source src="${msg.data}"></video></div>`;
          } else if (msg.type === "file") {
            return `<div class="file-message"><i class="fas fa-file"></i> <a href="${msg.data}" target="_blank" style="color:#00d4ff;">${msg.fileName || "Download"}</a></div>`;
          } else if (msg.type === "voice") {
            return `<div class="voice-message"><i class="fas fa-microphone"></i> <audio controls src="${msg.data}" style="max-width:200px;"></audio></div>`;
          }
          return escapeHtml(msg.text);
        }

        function renderFriends() {
          let friends = getFriends(currentUser);
          let container = document.getElementById("friendsList");
          if (!container) return;
          if (!friends.length) {
            container.innerHTML =
              '<div class="empty">No friends yet. Add some!</div>';
            return;
          }
          container.innerHTML = friends
            .map((f) => {
              let unread =
                messages[currentUser]?.[f]?.filter(
                  (m) => m.from === f && !m.read,
                ).length || 0;
              let lastMsg = messages[currentUser]?.[f]?.slice(-1)[0];
              let preview = lastMsg
                ? lastMsg.text ||
                  (lastMsg.type === "image"
                    ? "📷 Image"
                    : lastMsg.type === "video"
                      ? "🎥 Video"
                      : lastMsg.type === "voice"
                        ? "🎤 Voice"
                        : "📎 File")
                : "Say hello";
              return `<div class="friend-item" onclick="window.openChat('${f}','friend')">
        <div class="friend-avatar">👤</div>
        <div style="flex:1"><div class="friend-name">${users[f]?.displayName || f}</div><div class="friend-preview">${escapeHtml(preview.substring(0, 50))}</div></div>
        ${unread > 0 ? `<div class="notification-badge">${unread}</div>` : ""}
      </div>`;
            })
            .join("");
        }

        function renderMessages(friend) {
          let msgs = messages[currentUser]?.[friend] || [];
          let container = document.getElementById("chatMessages");
          if (!container) return;
          msgs.forEach((m) => {
            if (m.from === friend && !m.read) m.read = true;
          });
          saveAll();
          if (!msgs.length) {
            container.innerHTML = '<div class="empty">No messages yet</div>';
            return;
          }
          container.innerHTML = msgs
            .map(
              (m) =>
                `<div class="message-bubble ${m.from === currentUser ? "message-sent" : "message-received"}">${renderMediaMessage(m)}<div class="message-time">${m.time}</div></div>`,
            )
            .join("");
          setTimeout(() => {
            container.scrollTop = container.scrollHeight;
          }, 50);
          updateBadges();
        }

        function sendMediaMessage(to, type, data, fileName = null) {
          let msg = {
            id: Date.now(),
            type,
            data,
            fileName,
            from: currentUser,
            time: new Date().toLocaleTimeString(),
            read: false,
          };
          if (!messages[currentUser]) messages[currentUser] = {};
          if (!messages[currentUser][to]) messages[currentUser][to] = [];
          messages[currentUser][to].push(msg);
          if (!messages[to]) messages[to] = {};
          if (!messages[to][currentUser]) messages[to][currentUser] = [];
          messages[to][currentUser].push({ ...msg, read: false });
          saveAll();
          if (currentChatId === to && currentChatType === "friend")
            renderMessages(to);
          renderFriends();
        }

        function sendTextMessage(to, text) {
          if (!text.trim()) return;
          let msg = {
            id: Date.now(),
            text: text.trim(),
            from: currentUser,
            time: new Date().toLocaleTimeString(),
            read: false,
          };
          if (!messages[currentUser]) messages[currentUser] = {};
          if (!messages[currentUser][to]) messages[currentUser][to] = [];
          messages[currentUser][to].push(msg);
          if (!messages[to]) messages[to] = {};
          if (!messages[to][currentUser]) messages[to][currentUser] = [];
          messages[to][currentUser].push({ ...msg, read: false });
          saveAll();
          if (currentChatId === to && currentChatType === "friend")
            renderMessages(to);
          renderFriends();
        }

        function sendMessage() {
          let input = document.getElementById("messageInput");
          if (!input || !input.value.trim() || !currentChatId) return;
          if (currentChatType === "friend")
            sendTextMessage(currentChatId, input.value);
          else if (currentChatType === "group")
            sendGroupMessage(currentChatId, input.value);
          else if (currentChatType === "hub")
            sendHubMessage(currentChatId, input.value);
          input.value = "";
          refreshUI(); // immediate update
        }

        window.openChat = function (id, type) {
          currentChatId = id;
          currentChatType = type;
          if (type === "friend") {
            document.getElementById("chatHeaderName").innerHTML =
              users[id]?.displayName || id;
            document.getElementById("chatHeaderAvatar").innerHTML = "👤";
            renderMessages(id);
          } else if (type === "group") {
            let g = groups.find((g) => g.id == id);
            document.getElementById("chatHeaderName").innerHTML = g.name;
            document.getElementById("chatHeaderAvatar").innerHTML = g.picData
              ? `<div style="background-image:url(${g.picData}); background-size:cover; width:100%; height:100%;"></div>`
              : "👥";
            renderGroupMessages(id);
          } else if (type === "hub") {
            let h = hubs.find((h) => h.id == id);
            document.getElementById("chatHeaderName").innerHTML = h.name;
            document.getElementById("chatHeaderAvatar").innerHTML = h.picData
              ? `<div style="background-image:url(${h.picData}); background-size:cover; width:100%; height:100%;"></div>`
              : "📡";
            renderHubMessages(id);
          }
          document.getElementById("chatView").classList.add("open");
        };

        function closeChat() {
          currentChatId = null;
          document.getElementById("chatView").classList.remove("open");
        }

        // ---------- FRIEND REQUESTS ----------
        function renderPendingRequests() {
          let requests =
            friendRequests[currentUser]?.filter(
              (r) => r.status === "pending",
            ) || [];
          let container = document.getElementById("pendingRequestsSection");
          if (!container) return;
          if (!requests.length) {
            container.innerHTML = "";
            return;
          }
          container.innerHTML =
            `<div class="section-title">📨 Pending (${requests.length})</div>` +
            requests
              .map(
                (r) =>
                  `<div class="request-item"><div class="request-avatar">👤</div><div style="flex:1"><div class="friend-name">${users[r.from]?.displayName || r.from}</div></div><button class="small-btn" onclick="window.acceptReq('${r.from}')">Accept</button><button class="small-btn" onclick="window.denyReq('${r.from}')">Deny</button></div>`,
              )
              .join("");
        }

        function sendFriendRequest() {
          let targetRaw = document
            .getElementById("friendUsername")
            .value.trim();
          if (!targetRaw) {
            alert("Please enter a username");
            return;
          }
          let target = targetRaw.toLowerCase();
          if (target === currentUser) {
            alert("You cannot add yourself");
            return;
          }
          if (!users[target]) {
            alert(
              `User "${targetRaw}" not found. Make sure the username exists.`,
            );
            return;
          }
          if (users[currentUser].friends.includes(target)) {
            alert("Already friends!");
            closeModal("addFriendModal");
            return;
          }
          if (!friendRequests[target]) friendRequests[target] = [];
          if (
            friendRequests[target].some(
              (r) => r.from === currentUser && r.status === "pending",
            )
          ) {
            alert("Friend request already sent!");
            return;
          }
          friendRequests[target].push({
            from: currentUser,
            status: "pending",
            timestamp: Date.now(),
          });
          saveAll();
          alert(`Friend request sent to ${users[target].displayName}!`);
          closeModal("addFriendModal");
          document.getElementById("friendUsername").value = "";
          refreshUI();
        }

        window.acceptReq = function (fromUser) {
          let idx = friendRequests[currentUser].findIndex(
            (r) => r.from === fromUser,
          );
          if (idx !== -1) {
            friendRequests[currentUser].splice(idx, 1);
            if (!users[currentUser].friends.includes(fromUser))
              users[currentUser].friends.push(fromUser);
            if (!users[fromUser].friends.includes(currentUser))
              users[fromUser].friends.push(currentUser);
            saveAll();
            refreshUI();
            alert(`You are now friends with ${users[fromUser]?.displayName}`);
          }
        };

        window.denyReq = function (fromUser) {
          let idx = friendRequests[currentUser].findIndex(
            (r) => r.from === fromUser,
          );
          if (idx !== -1) {
            friendRequests[currentUser].splice(idx, 1);
            saveAll();
            refreshUI();
            alert(`Denied request from ${users[fromUser]?.displayName}`);
          }
        };

        // ---------- GROUPS (FULL FEATURED) ----------
        function renderGroups() {
          let myGroups = groups.filter((g) => g.members?.includes(currentUser));
          let container = document.getElementById("groupsList");
          if (!container) return;
          if (!myGroups.length) {
            container.innerHTML =
              '<div class="empty">No groups yet. Create one!</div>';
            return;
          }
          container.innerHTML = myGroups
            .map((g) => {
              let lastMsg = groupChats[g.id]?.slice(-1)[0];
              let preview = lastMsg ? lastMsg.text || "Media" : "No messages";
              let unread =
                groupChats[g.id]?.filter(
                  (m) => m.from !== currentUser && !m.read,
                ).length || 0;
              let avatarStyle = g.picData
                ? `style="background-image: url(${g.picData}); background-size: cover;"`
                : "";
              return `<div class="group-item" onclick="window.openChat(${g.id},'group')">
        <div class="group-avatar" ${avatarStyle}>${!g.picData ? "👥" : ""}</div>
        <div style="flex:1"><div class="friend-name">${escapeHtml(g.name)}</div><div class="friend-preview">${escapeHtml(preview.substring(0, 50))}</div></div>
        ${unread > 0 ? `<div class="notification-badge">${unread}</div>` : ""}
      </div>`;
            })
            .join("");
        }

        function renderGroupMessages(id) {

        // ---------- MEDIA ATTACHMENTS ----------
        function setupAttachments() {
          const attachMenu = document.getElementById("attachMenu");
          const attachBtn = document.getElementById("attachBtn");
          attachBtn.onclick = (e) => {
            e.stopPropagation();
            attachMenu.classList.toggle("show");
          };
          document.addEventListener("click", (e) => {

              attachMenu.classList.remove("show");
          });

          function handleFileUpload(accept, type) {
            let input = document.createElement("input");
            input.type = "file";
            input.accept = accept;
            input.onchange = (e) => {
              let file = e.target.files[0];
              if (file && currentChatId) {
                let reader = new FileReader();
                reader.onload = (ev) => {
                  if (currentChatType === "friend")
                    sendMediaMessage(
                      currentChatId,
                      type,
                      ev.target.result,
                      file.name,
                    );
                  else if (currentChatType === "group")
                    sendGroupMediaMessage(
                      currentChatId,
                      type,
                      ev.target.result,
                      file.name,
                    );
                  else if (currentChatType === "hub")
                    sendHubMediaMessage(
                      currentChatId,
                      type,
                      ev.target.result,
                      file.name,
                    );
                  refreshUI();
                };
                reader.readAsDataURL(file);
              }
              attachMenu.classList.remove("show");
            };
            input.click();
          }

          document.getElementById("attachImage").onclick = () =>
            handleFileUpload("image/*", "image");
          document.getElementById("attachVideo").onclick = () =>
            handleFileUpload("video/*", "video");
          document.getElementById("attachFile").onclick = () =>
            handleFileUpload("*/*", "file");
        }

        // ---------- VOICE RECORDING ----------
        const voiceBtn = document.getElementById("voiceRecordBtn");

        async function startRecording() {
          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              audio: true,
            });
            mediaRecorderObj = new MediaRecorder(stream);
            audioChunksArray = [];
            mediaRecorderObj.ondataavailable = (event) => {
              audioChunksArray.push(event.data);
            };
            mediaRecorderObj.onstop = () => {
              const audioBlob = new Blob(audioChunksArray, {
                type: "audio/webm",
              });
              const reader = new FileReader();
              reader.onload = function () {
                const audioDataUrl = reader.result;
                if (currentChatId) {
                  if (currentChatType === "friend")
                    sendMediaMessage(
                      currentChatId,
                      "voice",
                      audioDataUrl,
                      "voice.webm",
                    );
                  else if (currentChatType === "group")
                    sendGroupMediaMessage(
                      currentChatId,
                      "voice",
                      audioDataUrl,
                      "voice.webm",
                    );
                  else if (currentChatType === "hub")
                    sendHubMediaMessage(
                      currentChatId,
                      "voice",
                      audioDataUrl,
                      "voice.webm",
                    );
                  refreshUI();
                }
              };
              reader.readAsDataURL(audioBlob);
              stream.getTracks().forEach((track) => track.stop());
              voiceBtn.classList.remove("recording-active");
              voiceBtn.innerHTML = '<i class="fas fa-microphone"></i>';
              isRecordingActive = false;
            };
            mediaRecorderObj.start();
            isRecordingActive = true;
            voiceBtn.classList.add("recording-active");
            voiceBtn.innerHTML = '<i class="fas fa-stop"></i>';
          } catch (err) {
            alert("Microphone access denied or not available");
          }
        }

        function stopRecording() {
          if (mediaRecorderObj && isRecordingActive) {
            mediaRecorderObj.stop();
          }
        }

        voiceBtn.onclick = () => {
          if (!currentChatId) {
            alert("Open a chat first");
            return;
          }
          if (isRecordingActive) {
            stopRecording();
          } else {
            startRecording();
          }
        };

        // ---------- INITIALISE & REAL-TIME LOOP ----------
        function init() {
          loadAll();
          let saved = localStorage.getItem("currentUser");
          if (saved && users[saved]) {
            currentUser = saved;
            refreshUI();
            updateAvatar();
            window.showScreen("chats");
            document.getElementById("loginModal").classList.add("hidden");
          } else {
            document.getElementById("loginModal").classList.remove("hidden");
          }

          // Event listeners
          document.getElementById("loginBtn").onclick = doLogin;
          document.getElementById("signupBtn").onclick = doSignup;
          document.getElementById("showSignupLink").onclick = () => {
            document.getElementById("loginModal").classList.add("hidden");
            document.getElementById("signupModal").classList.remove("hidden");
          };
          document.getElementById("showLoginLink").onclick = () => {
            document.getElementById("signupModal").classList.add("hidden");
            document.getElementById("loginModal").classList.remove("hidden");
          };
          document.getElementById("logoutBtn").onclick = logout;
          document.getElementById("themeBtn").onclick = toggleTheme;
          document.getElementById("editProfileBtn").onclick = () =>
            document
              .getElementById("editProfileModal")
              .classList.remove("hidden");
          document.getElementById("saveProfileBtn").onclick = saveProfile;
          document.getElementById("deleteAccountBtn").onclick = deleteAccount;
          document.getElementById("closeProfileModal").onclick = () =>
            closeModal("editProfileModal");
          document.getElementById("addFriendBtn").onclick = () =>
            document
              .getElementById("addFriendModal")
              .classList.remove("hidden");
          document.getElementById("sendRequestBtn").onclick = sendFriendRequest;
          document.getElementById("closeAddFriendModal").onclick = () =>
            closeModal("addFriendModal");
          document.getElementById("createGroupBtn").onclick =
            showCreateGroupModal;
          document.getElementById("createGroupSubmitBtn").onclick = createGroup;
          document.getElementById("closeGroupModal").onclick = () =>
            closeModal("createGroupModal");
          document.getElementById("createHubBtn").onclick = showCreateHubModal;
          document.getElementById("createHubSubmitBtn").onclick = createHub;
          document.getElementById("closeHubModal").onclick = () =>
            closeModal("createHubModal");
          document.getElementById("newChapterBtn").onclick = () =>
            document.getElementById("chapterModal").classList.remove("hidden");
          document.getElementById("postChapterBtn").onclick = postChapter;
          document.getElementById("closeChapterModal").onclick = () =>
            closeModal("chapterModal");
          document.getElementById("closeChatBtn").onclick = closeChat;
          document.getElementById("sendMsgBtn").onclick = sendMessage;
          document.getElementById("messageInput").onkeypress = (e) => {
            if (e.key === "Enter") sendMessage();
          };
          document.getElementById("tagBtn").onclick = (e) => {
            e.stopPropagation();
            showTagPopup();
          };

          // Group/Hub picture previews
          document.getElementById("groupPicFile").onchange = function (e) {
            if (e.target.files && e.target.files[0]) {
              let reader = new FileReader();
              reader.onload = function (ev) {
                let preview = document.getElementById("groupPicPreview");
                preview.innerHTML = "";
                preview.style.backgroundImage = `url(${ev.target.result})`;
                preview.style.backgroundSize = "cover";
              };
              reader.readAsDataURL(e.target.files[0]);
            }
          };
          document.getElementById("hubPicFile").onchange = function (e) {
            if (e.target.files && e.target.files[0]) {
              let reader = new FileReader();
              reader.onload = function (ev) {
                let preview = document.getElementById("hubPicPreview");
                preview.innerHTML = "";
                preview.style.backgroundImage = `url(${ev.target.result})`;
                preview.style.backgroundSize = "cover";
              };
              reader.readAsDataURL(e.target.files[0]);
            }
          };

          buildEmojiPicker();
          setupAttachments();

          window.closeChat = closeChat;

          // REAL-TIME UPDATES every 2 seconds
          setInterval(() => {
            if (currentUser) refreshUI();
          }, 2000);
        }

        init();
      })();
    </script>
  </body>
</html>
