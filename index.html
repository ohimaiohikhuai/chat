<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Chatrix Cloud | Full Features</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2300d4ff'%3E%3Cpath d='M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V4c0-1.1-.9-2-2-2z'/%3E%3C/svg%3E"
    />
    <style>
      /* ===== FULL STYLES (same as your original app) ===== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        background: #000;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      body.light-theme {
        background: #e0e0e0;
      }
      body.light-theme .phone {
        background: #ffffff;
      }
      body.light-theme .friend-item,
      body.light-theme .group-item,
      body.light-theme .hub-item,
      body.light-theme .header,
      body.light-theme .chapter-card,
      body.light-theme .request-item {
        background: #f5f5f5;
      }
      body.light-theme .friend-name,
      body.light-theme .hub-name {
        color: #1a1a1a;
      }
      body.light-theme .chat-messages {
        background: #fafafa;
      }
      body.light-theme .message-received {
        background: #e4e6eb;
        color: #050505;
      }
      .phone {
        width: 375px;
        height: 700px;
        background: #0a0a0a;
        border-radius: 40px;
        overflow: hidden;
        position: relative;
        box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
      }
      .tabs {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        display: flex;
        background: #121212;
        border-top: 1px solid #333;
        z-index: 10;
      }
      .tab {
        flex: 1;
        text-align: center;
        padding: 12px;
        color: #888;
        font-size: 20px;
        cursor: pointer;
        position: relative;
      }
      .tab.active {
        color: #00d4ff;
        border-top: 2px solid #00d4ff;
        background: #1a1a1a;
      }
      .tab span {
        font-size: 11px;
        display: block;
      }
      .tab-badge {
        position: absolute;
        top: 4px;
        right: 20px;
        background: #ff3b30;
        color: white;
        border-radius: 12px;
        padding: 2px 6px;
        font-size: 10px;
        min-width: 18px;
      }
      .screen {
        height: calc(100% - 50px);
        overflow-y: auto;
        display: none;
        padding: 16px;
      }
      .screen.active {
        display: block;
      }
      .header {
        background: #121212;
        padding: 16px;
        border-radius: 20px;
        margin-bottom: 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }
      .header-left {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 1;
      }
      .header-right {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .app-logo {
        width: 36px;
        height: 36px;
        background: #00d4ff;
        border-radius: 50% 50% 45% 45%;
        position: relative;
        animation: float 2s ease-in-out infinite;
      }
      .app-logo .eyes {
        position: absolute;
        top: 10px;
        left: 7px;
        right: 7px;
        display: flex;
        justify-content: space-between;
      }
      .app-logo .eyes span {
        width: 8px;
        height: 8px;
        background: #0a0a0a;
        border-radius: 50%;
      }
      .app-logo .mouth {
        position: absolute;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        width: 10px;
        height: 5px;
        background: #0a0a0a;
        border-radius: 0 0 8px 8px;
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-3px);
        }
      }
      .logo-text {
        font-size: 22px;
        font-weight: bold;
        background: linear-gradient(135deg, #00d4ff, #0088ff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .user-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: #1a2a3a;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        color: #00d4ff;
        overflow: hidden;
        background-size: cover;
        cursor: pointer;
      }
      .icon-btn,
      .exit-btn {
        background: rgba(0, 212, 255, 0.2);
        border: 1px solid #00d4ff;
        color: #00d4ff;
        padding: 6px 10px;
        border-radius: 20px;
        font-size: 12px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        text-decoration: none;
      }
      .download-btn,
      .video-call-btn {
        background: #00d4ff;
        color: black;
        border: none;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 12px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        text-decoration: none;
        font-weight: bold;
      }
      .exit-btn {
        background: rgba(255, 60, 60, 0.3);
        border: none;
        color: white;
      }
      .add-friend,
      .new-chapter {
        background: rgba(0, 212, 255, 0.15);
        border: 1px solid #00d4ff;
        color: #00d4ff;
        padding: 10px;
        border-radius: 30px;
        width: 100%;
        margin-bottom: 12px;
        cursor: pointer;
        text-align: center;
      }
      .new-chapter {
        background: #00d4ff;
        color: black;
        font-weight: bold;
      }
      .prompt-box {
        background: linear-gradient(135deg, #00d4ff22, #0088ff22);
        border-radius: 20px;
        padding: 20px;
        text-align: center;
        margin-bottom: 16px;
        border: 1px solid #00d4ff44;
      }
      .friend-item,
      .group-item,
      .hub-item,
      .request-item,
      .leaderboard-item,
      .winner-card {
        display: flex;
        align-items: center;
        padding: 12px;
        background: #121212;
        margin-bottom: 8px;
        border-radius: 16px;
        cursor: pointer;
        position: relative;
      }
      .friend-avatar,
      .group-avatar,
      .hub-avatar,
      .request-avatar {
        width: 50px;
        height: 50px;
        background: #1a2a3a;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        margin-right: 12px;
        overflow: hidden;
        background-size: cover;
        background-position: center;
      }
      .friend-name {
        color: white;
        font-weight: bold;
      }
      .friend-preview {
        color: #888;
        font-size: 12px;
        margin-top: 4px;
      }
      .notification-badge {
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        background: #ff3b30;
        color: white;
        border-radius: 12px;
        padding: 2px 8px;
        font-size: 11px;
      }
      .tier-badge {
        background: linear-gradient(135deg, #ffd700, #ff8c00);
        color: #000;
        font-weight: bold;
        padding: 2px 8px;
        border-radius: 20px;
        font-size: 11px;
        margin-left: 8px;
      }
      .leaderboard-rank {
        font-weight: bold;
        font-size: 18px;
        margin-right: 12px;
        color: #ffd700;
        min-width: 30px;
      }
      .chat-view {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0a0a0a;
        z-index: 20;
        transform: translateX(100%);
        transition: 0.3s;
        display: flex;
        flex-direction: column;
      }
      .chat-view.open {
        transform: translateX(0);
      }
      .chat-header {
        background: #00d4ff;
        padding: 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        color: black;
        font-weight: bold;
      }
      .chat-header-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .chat-header-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        overflow: hidden;
        background-size: cover;
      }
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .message-bubble {
        max-width: 80%;
        padding: 8px 12px;
        border-radius: 20px;
        word-break: break-word;
      }
      .message-sent {
        background: #00d4ff;
        color: black;
        align-self: flex-end;
      }
      .message-received {
        background: #2c2c2e;
        color: white;
        align-self: flex-start;
      }
      .message-time {
        font-size: 10px;
        opacity: 0.7;
        margin-top: 4px;
      }
      .media-preview {
        max-width: 200px;
        max-height: 200px;
        border-radius: 12px;
        cursor: pointer;
        margin-top: 5px;
      }
      .file-message {
        background: rgba(0, 212, 255, 0.2);
        padding: 8px 12px;
        border-radius: 12px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .voice-message {
        background: rgba(0, 212, 255, 0.2);
        padding: 8px 12px;
        border-radius: 20px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .chat-input {
        display: flex;
        padding: 12px;
        gap: 8px;
        background: #1c1c1e;
        border-top: 1px solid #333;
        flex-wrap: wrap;
      }
      .chat-input input {
        flex: 1;
        background: #2c2c2e;
        border: none;
        border-radius: 25px;
        padding: 10px;
        color: white;
        outline: none;
      }
      .chat-input button {
        background: #00d4ff;
        border: none;
        border-radius: 25px;
        padding: 10px 18px;
        font-weight: bold;
        cursor: pointer;
        color: black;
      }
      .attach-btn,
      .tag-btn,
      .emoji-btn,
      .voice-record-btn {
        background: #2c2c2e;
        border: none;
        border-radius: 25px;
        padding: 10px 14px;
        color: white;
        cursor: pointer;
      }
      .emoji-picker,
      .tag-search-popup,
      .attach-menu {
        position: absolute;
        bottom: 70px;
        left: 12px;
        background: #1c1c1e;
        border-radius: 20px;
        padding: 12px;
        z-index: 40;
        border: 1px solid #00d4ff55;
        display: none;
      }
      .emoji-picker.show {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 8px;
        max-width: 300px;
        max-height: 200px;
        overflow-y: auto;
      }
      .tag-search-popup.show {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-width: 200px;
      }
      .attach-menu.show {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        min-width: 200px;
      }
      .tag-search-input {
        width: 100%;
        padding: 8px;
        border-radius: 20px;
        border: none;
        background: #2c2c2e;
        color: white;
        outline: none;
      }
      .tag-friend-item {
        padding: 8px 12px;
        cursor: pointer;
        border-radius: 10px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .tag-friend-item:hover {
        background: #00d4ff33;
      }
      .emoji-option {
        background: #1c1c1e;
        border: none;
        border-radius: 40px;
        padding: 8px;
        cursor: pointer;
        font-size: 20px;
      }
      .chapter-card {
        background: #1a1a1a;
        border-radius: 20px;
        padding: 16px;
        margin-bottom: 16px;
        border-left: 4px solid #00d4ff;
        cursor: pointer;
        position: relative;
      }
      .chapter-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }
      .chapter-avatar {
        width: 40px;
        height: 40px;
        background: #1a2a3a;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
      }
      .chapter-user {
        font-weight: bold;
        color: white;
      }
      .chapter-time {
        font-size: 10px;
        color: #888;
      }
      .chapter-text {
        color: #ccc;
        font-size: 14px;
        margin-top: 8px;
      }
      .chapter-stats {
        display: flex;
        gap: 16px;
        margin-top: 12px;
        font-size: 13px;
        color: #888;
      }
      .like-btn {
        background: none;
        border: none;
        color: #888;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .like-btn.liked {
        color: #ff4466;
      }
      .delete-chapter {
        position: absolute;
        top: 12px;
        right: 12px;
        background: rgba(255, 60, 60, 0.3);
        border: none;
        color: #ff6666;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 11px;
        cursor: pointer;
      }
      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .modal-card {
        background: #1c1c1e;
        border-radius: 30px;
        padding: 24px;
        width: 90%;
        text-align: center;
        border: 1px solid #00d4ff;
        max-height: 80%;
        overflow-y: auto;
      }
      .modal-card input,
      .modal-card textarea,
      .modal-card select {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        background: #2c2c2e;
        border: none;
        border-radius: 30px;
        color: white;
      }
      .modal-card button {
        background: #00d4ff;
        border: none;
        border-radius: 30px;
        padding: 12px;
        width: 100%;
        margin-top: 8px;
        font-weight: bold;
        cursor: pointer;
        color: black;
      }
      .modal-card .danger-button {
        background: #ff4444;
        color: white;
      }
      .member-checkbox {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px;
        border-bottom: 0.5px solid #333;
      }
      .link {
        color: #00d4ff;
        margin-top: 12px;
        cursor: pointer;
        font-size: 12px;
      }
      .hidden {
        display: none !important;
      }
      .empty {
        text-align: center;
        color: #666;
        padding: 40px;
      }
      .small-btn {
        background: rgba(0, 212, 255, 0.15);
        border: 1px solid #00d4ff;
        color: #00d4ff;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 11px;
        cursor: pointer;
        margin-left: 8px;
      }
      .profile-pic {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: #1a2a3a;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
        margin: 0 auto 12px;
        overflow: hidden;
        background-size: cover;
      }
      .mention {
        color: #00d4ff;
        font-weight: bold;
        cursor: pointer;
        text-decoration: underline;
      }
      .section-title {
        color: #00d4ff;
        margin: 16px 0 8px 0;
        font-size: 14px;
      }
      .winner-trophy {
        font-size: 24px;
        margin-right: 12px;
      }
      .leaderboard-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 12px;
        padding: 8px;
        background: #1a1a1a;
        border-radius: 16px;
        color: #00d4ff;
        font-weight: bold;
      }
      .recording-active {
        background: #ff4444 !important;
        color: white !important;
        animation: pulse 1s infinite;
      }
      @keyframes pulse {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.6;
        }
        100% {
          opacity: 1;
        }
      }
    </style>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
  </head>
  <body>
    <div class="phone">
      <div class="tabs">
        <div
          class="tab active"
          data-tab="chats"
          onclick="window.showScreen('chats')"
        >
          <i class="fas fa-comment-dots"></i><span>Chats</span
          ><span id="chatsTabBadge" class="tab-badge hidden">0</span>
        </div>
        <div
          class="tab"
          data-tab="groups"
          onclick="window.showScreen('groups')"
        >
          <i class="fas fa-users"></i><span>Groups</span
          ><span id="groupsTabBadge" class="tab-badge hidden">0</span>
        </div>
        <div class="tab" data-tab="hubs" onclick="window.showScreen('hubs')">
          <i class="fas fa-layer-group"></i><span>Hubs</span
          ><span id="hubsTabBadge" class="tab-badge hidden">0</span>
        </div>
        <div
          class="tab"
          data-tab="chapters"
          onclick="window.showScreen('chapters')"
        >
          <i class="fas fa-book-open"></i><span>Chapters</span
          ><span id="chaptersTabBadge" class="tab-badge hidden">0</span>
        </div>
        <div
          class="tab"
          data-tab="leaderboard"
          onclick="window.showScreen('leaderboard')"
        >
          <i class="fas fa-trophy"></i><span>Tiers</span>
        </div>
        <div
          class="tab"
          data-tab="winners"
          onclick="window.showScreen('winners')"
        >
          <i class="fas fa-crown"></i><span>Winners</span>
        </div>
      </div>

      <div id="chatsScreen" class="screen active">
        <div class="header">
          <div class="header-left">
            <div class="app-logo">
              <div class="eyes"><span></span><span></span></div>
              <div class="mouth"></div>
            </div>
            <div class="logo-text">Chatrix</div>
            <div class="user-avatar" id="currentUserAvatar">👤</div>
          </div>
          <div class="header-right">
            <a
              href="https://web2apk.online/build_app.php?weburl=https%3A%2F%2Fchatrixs.vercel.app%2F"
              class="download-btn"
              target="_blank"
              ><i class="fas fa-download"></i> Download App</a
            >
            <a
              href="https://chatrixscall.vercel.app/"
              class="video-call-btn"
              target="_blank"
              ><i class="fas fa-video"></i> Video Call</a
            >
            <button class="icon-btn" id="themeBtn">
              <i class="fas fa-sun"></i>
            </button>
            <button class="icon-btn" id="editProfileBtn">
              <i class="fas fa-user-edit"></i>
            </button>
            <button class="exit-btn" id="logoutBtn">Exit</button>
          </div>
        </div>
        <button class="add-friend" id="addFriendBtn">+ Add Friend</button>
        <div id="pendingRequestsSection"></div>
        <div id="friendsList"></div>
      </div>

      <div id="groupsScreen" class="screen">
        <div class="header">
          <div class="app-logo">
            <div class="eyes"><span></span><span></span></div>
            <div class="mouth"></div>
          </div>
          <div class="logo-text">Groups</div>
          <div></div>
        </div>
        <button class="add-friend" id="createGroupBtn">+ Create Group</button>
        <div id="groupsList"></div>
      </div>

      <div id="hubsScreen" class="screen">
        <div class="header">
          <div class="app-logo">
            <div class="eyes"><span></span><span></span></div>
            <div class="mouth"></div>
          </div>
          <div class="logo-text">Hubs</div>
          <div></div>
        </div>
        <button class="add-friend" id="createHubBtn">+ Create Hub</button>
        <div id="hubsList"></div>
      </div>

      <div id="chaptersScreen" class="screen">
        <div class="header">
          <div class="app-logo">
            <div class="eyes"><span></span><span></span></div>
            <div class="mouth"></div>
          </div>
          <div class="logo-text">Chapters</div>
          <div></div>
        </div>
        <div class="prompt-box">
          <p>📖 Post a chapter daily to increase your TIER!</p>
          <button class="new-chapter" id="newChapterBtn">+ New Chapter</button>
        </div>
        <div id="chaptersList"></div>
      </div>

      <div id="leaderboardScreen" class="screen">
        <div class="header">
          <div class="app-logo">
            <div class="eyes"><span></span><span></span></div>
            <div class="mouth"></div>
          </div>
          <div class="logo-text">Tier Leaderboard</div>
          <div></div>
        </div>
        <div id="leaderboardList"></div>
      </div>

      <div id="winnersScreen" class="screen">
        <div class="header">
          <div class="app-logo">
            <div class="eyes"><span></span><span></span></div>
            <div class="mouth"></div>
          </div>
          <div class="logo-text">🏆 Chat Leaders</div>
          <div></div>
        </div>

    <script>
      // ==================== FIREBASE CONFIG (YOUR PROVIDED CONFIG) ====================
      const firebaseConfig = {
        apiKey: "AIzaSyAGftHy2cSWCz_h5nKQF-BChy885CYA9f4",
        authDomain: "chatrix-77180.firebaseapp.com",
        projectId: "chatrix-77180",
        storageBucket: "chatrix-77180.firebasestorage.app",
        messagingSenderId: "258648778331",
        appId: "1:258648778331:web:294dd149ce2baf32e9c17e",
        measurementId: "G-Y1HXR2QPKN",
      };
      // =============================================================================

      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();
      const storage = firebase.storage();
      const auth = firebase.auth();

      // Global state
      let currentUser = null;
      let currentUserDoc = null;
      let currentChatId = null;
      let currentChatType = "friend";
      let unsubscribeListeners = [];

      // Helper functions
      function escapeHtml(str) {
        if (!str) return "";
        return String(str).replace(/[&<>]/g, (m) =>
          m === "&" ? "&amp;" : m === "<" ? "&lt;" : "&gt;",
        );
      }
      function formatTime(ts) {
        if (!ts) return "";
        const d = ts.toDate ? ts.toDate() : new Date(ts);
        return d.toLocaleTimeString();
      }
      function showScreen(screen) {
        document
          .querySelectorAll(".screen")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById(screen + "Screen").classList.add("active");
        document.querySelectorAll(".tab").forEach((tab) => {
          tab.classList.remove("active");
          if (tab.getAttribute("data-tab") === screen)
            tab.classList.add("active");
        });
        if (screen === "chats") {
          renderFriends();
          renderPendingRequests();
        }
        if (screen === "groups") renderGroups();
        if (screen === "hubs") renderHubs();
        if (screen === "chapters") renderChapters();
        if (screen === "leaderboard") renderLeaderboard();
        if (screen === "winners") renderWinners();
      }
      window.showScreen = showScreen;
      function closeModal(id) {
        document.getElementById(id).classList.add("hidden");
      }

      // ==================== AUTH & USER ====================
      async function doLogin() {
        const username = document
          .getElementById("loginUser")
          .value.trim()
          .toLowerCase();
        const password = document.getElementById("loginPass").value;
        if (!username || !password) {
          alert("Enter username and password");
          return;
        }
        try {
          const email = username + "@chatrix.local";
          await auth.signInWithEmailAndPassword(email, password);
          await loadCurrentUserData(username);
          document.getElementById("loginModal").classList.add("hidden");
          refreshAllUI();
          updateAvatar();
          showScreen("chats");
        } catch (err) {
          alert("Invalid username or password");
        }
      }
      async function doSignup() {
        const username = document
          .getElementById("signupUser")
          .value.trim()
          .toLowerCase();
        const password = document.getElementById("signupPass").value;
        const confirm = document.getElementById("signupConfirm").value;
        if (!username || !password) {
          alert("Username and password required");
          return;
        }
        if (password !== confirm) {
          alert("Passwords don't match");
          return;
        }
        try {
          const email = username + "@chatrix.local";
          await auth.createUserWithEmailAndPassword(email, password);
          await db.collection("users").doc(username).set({
            username: username,
            displayName: username,
            friends: [],
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          });
          await db.collection("tiers").doc(username).set({
            tier: 0,
            lastPostDate: null,
            streak: 0,
          });
          alert("Account created! Please log in.");
          document.getElementById("signupModal").classList.add("hidden");
          document.getElementById("loginModal").classList.remove("hidden");
        } catch (err) {
          alert(err.message);
        }
      }
      async function loadCurrentUserData(username) {
        const doc = await db.collection("users").doc(username).get();
        if (doc.exists) {
          currentUserDoc = { id: doc.id, ...doc.data() };
        } else {
          await db.collection("users").doc(username).set({
            username: username,
            displayName: username,
            friends: [],
          });
          currentUserDoc = {
            id: username,
            username,
            displayName: username,
            friends: [],
          };
        }
      }
      function logout() {
        auth.signOut();
        currentUser = null;
        currentUserDoc = null;
        currentChatId = null;
        unsubscribeListeners.forEach((fn) => fn());
        unsubscribeListeners = [];
        document.getElementById("loginModal").classList.remove("hidden");
      }
      window.logout = logout;

      // ==================== REAL-TIME UI REFRESH ====================
      function refreshAllUI() {
        if (!currentUserDoc) return;
        renderFriends();
        renderPendingRequests();
        renderGroups();
        renderHubs();
        renderChapters();
        renderLeaderboard();
        renderWinners();
        if (currentChatId && currentChatType === "friend")
          renderMessages(currentChatId);
        else if (currentChatId && currentChatType === "group")
          renderGroupMessages(currentChatId);
        else if (currentChatId && currentChatType === "hub")
          renderHubMessages(currentChatId);
        updateBadges();
      }
      function updateBadges() {
        let totalUnread = 0;
        document.getElementById("chatsTabBadge").innerHTML = totalUnread;
        document
          .getElementById("chatsTabBadge")
          .classList.toggle("hidden", totalUnread === 0);
      }

      // ==================== FRIENDS & CHAT (WITH PROFILE PICTURES) ====================
      async function getUserProfilePic(uid) {
        const doc = await db.collection("users").doc(uid).get();
        return doc.exists ? doc.data().profilePic : null;
      }

      async function renderFriends() {
        if (!currentUserDoc) return;
        const friendsList = currentUserDoc.friends || [];
        const container = document.getElementById("friendsList");
        if (!container) return;
        if (friendsList.length === 0) {
          container.innerHTML =
            '<div class="empty">No friends yet. Add some!</div>';
          return;
        }
        let html = "";
        for (const friendId of friendsList) {
          const friendDoc = await db.collection("users").doc(friendId).get();
          const friendName = friendDoc.exists
            ? friendDoc.data().displayName
            : friendId;
          const friendPic = friendDoc.exists
            ? friendDoc.data().profilePic
            : null;
          const chatId = [currentUserDoc.username, friendId].sort().join("_");
          const lastMsgSnap = await db
            .collection("messages")
            .doc(chatId)
            .collection("chat")
            .orderBy("timestamp", "desc")
            .limit(1)
            .get();
          let preview = "Say hello";
          if (!lastMsgSnap.empty)
            preview = lastMsgSnap.docs[0].data().text || "Media";
          const avatarStyle = friendPic
            ? `style="background-image: url(${friendPic}); background-size: cover;"`
            : "";
          html += `<div class="friend-item" onclick="window.openChat('${friendId}','friend')">
      <div class="friend-avatar" ${avatarStyle}>${!friendPic ? "👤" : ""}</div>
      <div style="flex:1"><div class="friend-name">${escapeHtml(friendName)}</div><div class="friend-preview">${escapeHtml(preview.substring(0, 50))}</div></div>
    </div>`;
        }
        container.innerHTML = html;
      }

      async function renderMessages(friendId) {
        const chatId = [currentUserDoc.username, friendId].sort().join("_");
        const container = document.getElementById("chatMessages");
        if (!container) return;
        if (unsubscribeListeners[0]) unsubscribeListeners[0]();
        const unsubscribe = db
          .collection("messages")
          .doc(chatId)
          .collection("chat")
          .orderBy("timestamp")
          .onSnapshot((snapshot) => {
            const msgs = [];
            snapshot.forEach((doc) => msgs.push({ id: doc.id, ...doc.data() }));
            if (msgs.length === 0) {
              container.innerHTML = '<div class="empty">No messages yet</div>';
              return;
            }
            container.innerHTML = msgs
              .map(
                (m) =>
                  `<div class="message-bubble ${m.from === currentUserDoc.username ? "message-sent" : "message-received"}">${escapeHtml(m.text)}<div class="message-time">${formatTime(m.timestamp)}</div></div>`,
              )
              .join("");
            container.scrollTop = container.scrollHeight;
          });
        unsubscribeListeners[0] = unsubscribe;
      }
      async function sendTextMessage(to, text) {
        if (!text.trim()) return;
        const chatId = [currentUserDoc.username, to].sort().join("_");
        await db.collection("messages").doc(chatId).collection("chat").add({
          from: currentUserDoc.username,
          text: text.trim(),
          timestamp: firebase.firestore.FieldValue.serverTimestamp(),
          read: false,
        });
        if (currentChatId === to && currentChatType === "friend")
          renderMessages(to);
        renderFriends();
      }
      function sendMessage() {
        const input = document.getElementById("messageInput");
        if (!input || !input.value.trim() || !currentChatId) return;
        if (currentChatType === "friend")
          sendTextMessage(currentChatId, input.value);
        input.value = "";
      }
      window.sendMessage = sendMessage;
      window.openChat = function (id, type) {
        currentChatId = id;
        currentChatType = type;
        if (type === "friend") {
          document.getElementById("chatHeaderName").innerHTML = id;
          document.getElementById("chatHeaderAvatar").innerHTML = "👤";
          renderMessages(id);
        } else if (type === "group") {
          document.getElementById("chatHeaderName").innerHTML = "Group";
          document.getElementById("chatHeaderAvatar").innerHTML = "👥";
          renderGroupMessages(id);
        } else if (type === "hub") {
          document.getElementById("chatHeaderName").innerHTML = "Hub";
          document.getElementById("chatHeaderAvatar").innerHTML = "📡";
          renderHubMessages(id);
        }
        document.getElementById("chatView").classList.add("open");
      };
      function closeChat() {
        currentChatId = null;
        document.getElementById("chatView").classList.remove("open");
      }
      window.closeChat = closeChat;

      // ==================== FRIEND REQUESTS ====================
      async function renderPendingRequests() {
        const requestsSnap = await db
          .collection("friendRequests")
          .where("to", "==", currentUserDoc.username)
          .where("status", "==", "pending")
          .get();
        const container = document.getElementById("pendingRequestsSection");
        if (!container) return;
        if (requestsSnap.empty) {
          container.innerHTML = "";
          return;
        }
        let html = `<div class="section-title">📨 Pending (${requestsSnap.size})</div>`;
        requestsSnap.forEach((doc) => {
          const req = doc.data();
          html += `<div class="request-item"><div class="request-avatar">👤</div><div style="flex:1"><div class="friend-name">${escapeHtml(req.from)}</div></div><button class="small-btn" onclick="window.acceptReq('${req.from}')">Accept</button><button class="small-btn" onclick="window.denyReq('${req.from}')">Deny</button></div>`;
        });
        container.innerHTML = html;
      }
      async function sendFriendRequest() {
        const target = document
          .getElementById("friendUsername")
          .value.trim()
          .toLowerCase();
        if (!target || target === currentUserDoc.username) {
          alert("Invalid username");
          return;
        }
        const userRef = await db.collection("users").doc(target).get();
        if (!userRef.exists) {
          alert("User not found");
          return;
        }
        if (currentUserDoc.friends.includes(target)) {
          alert("Already friends!");
          closeModal("addFriendModal");
          return;
        }
        const existing = await db
          .collection("friendRequests")
          .where("from", "==", currentUserDoc.username)
          .where("to", "==", target)
          .where("status", "==", "pending")
          .get();
        if (!existing.empty) {
          alert("Request already sent!");
          return;
        }
        await db.collection("friendRequests").add({
          from: currentUserDoc.username,
          to: target,
          status: "pending",
          timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        });
        alert("Friend request sent!");
        closeModal("addFriendModal");
        document.getElementById("friendUsername").value = "";
      }
      window.acceptReq = async function (fromUser) {
        const query = await db
          .collection("friendRequests")
          .where("from", "==", fromUser)
          .where("to", "==", currentUserDoc.username)
          .where("status", "==", "pending")
          .get();
        if (query.empty) return;
        const doc = query.docs[0];
        await doc.ref.update({ status: "accepted" });
        await db
          .collection("users")
          .doc(currentUserDoc.username)
          .update({
            friends: firebase.firestore.FieldValue.arrayUnion(fromUser),
          });
        await db
          .collection("users")
          .doc(fromUser)
          .update({
            friends: firebase.firestore.FieldValue.arrayUnion(
              currentUserDoc.username,
            ),
          });
        refreshAllUI();
        alert(`You are now friends with ${fromUser}`);
      };
      window.denyReq = async function (fromUser) {
        const query = await db
          .collection("friendRequests")
          .where("from", "==", fromUser)
          .where("to", "==", currentUserDoc.username)
          .where("status", "==", "pending")
          .get();
        if (query.empty) return;
        await query.docs[0].ref.delete();
        refreshAllUI();
        alert(`Denied request from ${fromUser}`);
      };

      // ==================== GROUPS ====================
      async function renderGroups() {
        const groupsSnap = await db
          .collection("groups")
          .where("members", "array-contains", currentUserDoc.username)
          .get();
        const container = document.getElementById("groupsList");
        if (!container) return;
        if (groupsSnap.empty) {
          container.innerHTML =
            '<div class="empty">No groups yet. Create one!</div>';
          return;
        }
        let html = "";
        for (const doc of groupsSnap.docs) {
          const g = doc.data();
          const lastMsgSnap = await db
            .collection("groupMessages")
            .doc(doc.id)
            .collection("chat")
            .orderBy("timestamp", "desc")
            .limit(1)
            .get();
          let preview = "No messages";
          if (!lastMsgSnap.empty)
            preview = lastMsgSnap.docs[0].data().text || "Media";
          const avatarStyle = g.picUrl
            ? `style="background-image: url(${g.picUrl}); background-size: cover;"`
            : "";
          html += `<div class="group-item" onclick="window.openChat('${doc.id}','group')">
      <div class="group-avatar" ${avatarStyle}>${!g.picUrl ? "👥" : ""}</div>
      <div style="flex:1"><div class="friend-name">${escapeHtml(g.name)}</div><div class="friend-preview">${escapeHtml(preview.substring(0, 50))}</div></div>
    </div>`;
        }
        container.innerHTML = html;
      }
      async function renderGroupMessages(groupId) {
        const container = document.getElementById("chatMessages");
        if (!container) return;
        if (unsubscribeListeners[1]) unsubscribeListeners[1]();
        const unsubscribe = db
          .collection("groupMessages")
          .doc(groupId)
          .collection("chat")
          .orderBy("timestamp")
          .onSnapshot((snapshot) => {
            const msgs = [];
            snapshot.forEach((doc) => msgs.push({ id: doc.id, ...doc.data() }));
            if (msgs.length === 0) {
              container.innerHTML = '<div class="empty">No messages yet</div>';
              return;
            }
            container.innerHTML = msgs
              .map(
                (m) =>
                  `<div class="message-bubble ${m.from === currentUserDoc.username ? "message-sent" : "message-received"}">${escapeHtml(m.text)}<div class="message-time">${formatTime(m.timestamp)}</div></div>`,
              )
              .join("");
            container.scrollTop = container.scrollHeight;
          });
        unsubscribeListeners[1] = unsubscribe;
      }
      async function sendGroupMessage(groupId, text) {
        if (!text.trim()) return;
        await db
          .collection("groupMessages")
          .doc(groupId)
          .collection("chat")
          .add({
            from: currentUserDoc.username,
            text: text.trim(),
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
          });
        if (currentChatId === groupId && currentChatType === "group")
          renderGroupMessages(groupId);
      }
      function showCreateGroupModal() {
        const friends = currentUserDoc.friends || [];
        let membersHtml = friends
          .map(
            (f) =>
              `<label class="member-checkbox"><input type="checkbox" value="${f}"> ${f}</label>`,
          )
          .join("");
        document.getElementById("groupMembersSelect").innerHTML = membersHtml;
        document.getElementById("groupAdminsSelect").innerHTML =
          `<label class="member-checkbox"><input type="checkbox" disabled checked> ${currentUserDoc.username} (Creator)</label>`;
        document.getElementById("createGroupModal").classList.remove("hidden");
      }
      async function createGroup() {
        const name = document.getElementById("groupName").value.trim();
        if (!name) {
          alert("Group name required");
          return;
        }
        const desc = document.getElementById("groupDesc").value;
        const selectedMembers = [
          ...document.querySelectorAll("#groupMembersSelect input:checked"),
        ].map((cb) => cb.value);
        const members = [currentUserDoc.username, ...selectedMembers];
        let picUrl = null;
        const picFile = document.getElementById("groupPicFile").files[0];
        if (picFile) {
          const storageRef = storage
            .ref()
            .child(`groupPics/${Date.now()}_${picFile.name}`);
          await storageRef.put(picFile);
          picUrl = await storageRef.getDownloadURL();
        }
        await db.collection("groups").add({
          name,
          desc,
          creator: currentUserDoc.username,
          admins: [currentUserDoc.username],
          members,
          picUrl,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
        closeModal("createGroupModal");
        renderGroups();
      }

      // ==================== HUBS ====================
      async function renderHubs() {
        const hubsSnap = await db
          .collection("hubs")
          .where("members", "array-contains", currentUserDoc.username)
          .get();
        const container = document.getElementById("hubsList");
        if (!container) return;
        if (hubsSnap.empty) {
          container.innerHTML = '<div class="empty">No hubs</div>';
          return;
        }
        let html = "";
        for (const doc of hubsSnap.docs) {
          const h = doc.data();
          const avatarStyle = h.picUrl
            ? `style="background-image: url(${h.picUrl}); background-size: cover;"`
            : "";
          html += `<div class="hub-item" onclick="window.openChat('${doc.id}','hub')">
      <div class="hub-avatar" ${avatarStyle}>${!h.picUrl ? "📡" : ""}</div>
      <div><div class="friend-name">${escapeHtml(h.name)}</div><div class="friend-preview">${h.members.length} members</div></div>
    </div>`;
        }
        container.innerHTML = html;
      }
      async function renderHubMessages(hubId) {
        const container = document.getElementById("chatMessages");
        if (!container) return;
        if (unsubscribeListeners[2]) unsubscribeListeners[2]();
        const unsubscribe = db
          .collection("hubMessages")
          .doc(hubId)
          .collection("chat")
          .orderBy("timestamp")
          .onSnapshot((snapshot) => {
            const msgs = [];
            snapshot.forEach((doc) => msgs.push({ id: doc.id, ...doc.data() }));
            if (msgs.length === 0) {
              container.innerHTML = '<div class="empty">No messages yet</div>';
              return;
            }
            container.innerHTML = msgs
              .map(
                (m) =>
                  `<div class="message-bubble ${m.from === currentUserDoc.username ? "message-sent" : "message-received"}">${escapeHtml(m.text)}<div class="message-time">${formatTime(m.timestamp)}</div></div>`,
              )
              .join("");
            container.scrollTop = container.scrollHeight;
          });
        unsubscribeListeners[2] = unsubscribe;
      }
      async function sendHubMessage(hubId, text) {
        if (!text.trim()) return;
        await db.collection("hubMessages").doc(hubId).collection("chat").add({
          from: currentUserDoc.username,
          text: text.trim(),
          timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        });
        if (currentChatId === hubId && currentChatType === "hub")
          renderHubMessages(hubId);
      }
      function showCreateHubModal() {
        document.getElementById("createHubModal").classList.remove("hidden");
      }
      async function createHub() {
        const name = document.getElementById("hubName").value.trim();
        if (!name) {
          alert("Hub name required");
          return;
        }
        const desc = document.getElementById("hubDesc").value;
        const password = document.getElementById("hubPass").value;
        let picUrl = null;
        const picFile = document.getElementById("hubPicFile").files[0];
        if (picFile) {
          const storageRef = storage
            .ref()
            .child(`hubPics/${Date.now()}_${picFile.name}`);
          await storageRef.put(picFile);
          picUrl = await storageRef.getDownloadURL();
        }
        await db.collection("hubs").add({
          name,
          desc,
          password,
          creator: currentUserDoc.username,
          members: [currentUserDoc.username],
          picUrl,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
        closeModal("createHubModal");
        renderHubs();
      }

      // ==================== CHAPTERS ====================
      async function renderChapters() {
        const chaptersSnap = await db
          .collection("chapters")
          .orderBy("timestamp", "desc")
          .get();
        const container = document.getElementById("chaptersList");
        if (!container) return;
        if (chaptersSnap.empty) {
          container.innerHTML =
            '<div class="empty">No chapters yet. Post your first chapter!</div>';
          return;
        }
        let html = "";
        for (const doc of chaptersSnap.docs) {
          const c = doc.data();
          const userDoc = await db.collection("users").doc(c.user).get();
          const displayName = userDoc.exists
            ? userDoc.data().displayName
            : c.user;
          const tierDoc = await db.collection("tiers").doc(c.user).get();
          const tier = tierDoc.exists ? tierDoc.data().tier : 0;
          const isLiked = c.likes && c.likes.includes(currentUserDoc.username);
          html += `<div class="chapter-card" onclick="window.viewChapter('${doc.id}')">
      <div class="chapter-header"><div class="chapter-avatar">📖</div><div><div class="chapter-user">${escapeHtml(displayName)} <span class="tier-badge">${getTierName(tier)}</span></div><div class="chapter-time">${formatTime(c.timestamp)}</div></div></div>
      <div class="chapter-text">${escapeHtml(c.text)}</div>
      <div class="chapter-stats"><span>❤️ ${c.likes?.length || 0}</span><button class="like-btn ${isLiked ? "liked" : ""}" onclick="event.stopPropagation();window.likeChapter('${doc.id}')"><i class="fas fa-heart"></i></button></div>
      ${c.user === currentUserDoc.username ? `<button class="delete-chapter" onclick="event.stopPropagation();window.deleteChapter('${doc.id}')">Del</button>` : ""}
    </div>`;
        }
        container.innerHTML = html;
      }
      window.viewChapter = async function (id) {
        const doc = await db.collection("chapters").doc(id).get();
        if (!doc.exists) return;
        const c = doc.data();
        alert(`📖 ${c.text}\n❤️ ${c.likes?.length || 0} likes`);
      };
      window.likeChapter = async function (id) {
        const chapterRef = db.collection("chapters").doc(id);
        const chapter = await chapterRef.get();
        if (!chapter.exists) return;
        const likes = chapter.data().likes || [];
        let newLikes;
        if (likes.includes(currentUserDoc.username)) {
          newLikes = likes.filter((u) => u !== currentUserDoc.username);
        } else {
          newLikes = [...likes, currentUserDoc.username];
        }
        await chapterRef.update({ likes: newLikes });
        renderChapters();
      };
      window.deleteChapter = async function (id) {
        if (!confirm("Delete this chapter?")) return;
        await db.collection("chapters").doc(id).delete();
        renderChapters();
      };
      async function postChapter() {
        const text = document.getElementById("chapterText").value.trim();
        if (!text) return;
        await db.collection("chapters").add({
          user: currentUserDoc.username,
          text: text,
          timestamp: firebase.firestore.FieldValue.serverTimestamp(),
          likes: [],
        });
        const tierRef = db.collection("tiers").doc(currentUserDoc.username);
        const tierDoc = await tierRef.get();
        const currentTier = tierDoc.exists ? tierDoc.data().tier : 0;
        await tierRef.set(
          {
            tier: currentTier + 1,
            lastPostDate: new Date(),
            streak: firebase.firestore.FieldValue.increment(1),
          },
          { merge: true },
        );
        closeModal("chapterModal");
        document.getElementById("chapterText").value = "";
        renderChapters();
        renderLeaderboard();
        alert("Chapter posted! +1 Tier point");
      }

      // ==================== LEADERBOARD ====================
      function getTierName(tier) {
        if (tier >= 50) return "🏆 LEGEND";
        if (tier >= 30) return "💎 MASTER";
        if (tier >= 20) return "🥇 ELITE";
        if (tier >= 10) return "🥈 ADVANCED";
        if (tier >= 5) return "🥉 NOVICE";
        if (tier >= 1) return "🌱 BEGINNER";
        return "📘 ROOKIE";
      }
      async function renderLeaderboard() {
        const tiersSnap = await db
          .collection("tiers")
          .orderBy("tier", "desc")
          .get();
        const container = document.getElementById("leaderboardList");
        if (!container) return;
        if (tiersSnap.empty) {
          container.innerHTML = '<div class="empty">No data</div>';
          return;
        }
        let html = `<div class="leaderboard-header"><span>Rank</span><span>User</span><span>Tier</span></div>`;
        let idx = 1;
        for (const doc of tiersSnap.docs) {
          const data = doc.data();
          const userDoc = await db.collection("users").doc(doc.id).get();
          const displayName = userDoc.exists
            ? userDoc.data().displayName
            : doc.id;
          html += `<div class="leaderboard-item"><div class="leaderboard-rank">#${idx++}</div><div>🏆</div><div style="flex:1"><div class="friend-name">${escapeHtml(displayName)}</div></div><div><span class="tier-badge">${getTierName(data.tier)} (${data.tier})</span></div></div>`;
        }
        container.innerHTML = html;
      }
      function renderWinners() {
        // optional
      }

      // ==================== PROFILE & DELETE ACCOUNT (WITH SYNCED PICTURE) ====================
      async function updateAvatar() {
        const avatar = document.getElementById("currentUserAvatar");
        if (!avatar || !currentUserDoc) return;
        const userDoc = await db
          .collection("users")
          .doc(currentUserDoc.username)
          .get();
        const picUrl = userDoc.data().profilePic;
        if (picUrl) {
          avatar.style.backgroundImage = `url(${picUrl})`;
          avatar.style.backgroundSize = "cover";
          avatar.innerHTML = "";
        } else {
          avatar.style.backgroundImage = "";
          avatar.innerHTML = "👤";
        }
      }
      async function saveProfile() {
        const newName = document.getElementById("editDisplayName").value.trim();
        if (newName) {
          await db
            .collection("users")
            .doc(currentUserDoc.username)
            .update({ displayName: newName });
          currentUserDoc.displayName = newName;
        }
        const newPass = document.getElementById("editPassword").value;
        if (newPass) {
          const confirm = document.getElementById("editConfirmPassword").value;
          if (newPass !== confirm) {
            alert("Passwords do not match");
            return;
          }
          const user = auth.currentUser;
          await user.updatePassword(newPass);
          alert("Password updated! Use your new password next login.");
        }
        const picFile = document.getElementById("profilePicInput").files[0];
        if (picFile) {
          const storageRef = storage
            .ref()
            .child(`profilePics/${currentUserDoc.username}`);
          await storageRef.put(picFile);
          const downloadUrl = await storageRef.getDownloadURL();
          await db
            .collection("users")
            .doc(currentUserDoc.username)
            .update({ profilePic: downloadUrl });
          // Update own avatar immediately
          updateAvatar();
          // Also refresh friends list so others see new picture (their refresh will pick it up)
        }
        closeModal("editProfileModal");
        refreshAllUI();
        alert("Profile updated!");
      }
      async function deleteAccount() {
        if (!confirm("Delete your account permanently? All data will be lost."))
          return;
        const friends = currentUserDoc.friends || [];
        for (const friend of friends) {
          await db
            .collection("users")
            .doc(friend)
            .update({
              friends: firebase.firestore.FieldValue.arrayRemove(
                currentUserDoc.username,
              ),
            });
        }
        const requestsFrom = await db
          .collection("friendRequests")
          .where("from", "==", currentUserDoc.username)
          .get();
        requestsFrom.forEach((d) => d.ref.delete());
        const requestsTo = await db
          .collection("friendRequests")
          .where("to", "==", currentUserDoc.username)
          .get();
        requestsTo.forEach((d) => d.ref.delete());
        const groupsSnap = await db
          .collection("groups")
          .where("members", "array-contains", currentUserDoc.username)
          .get();
        for (const doc of groupsSnap.docs) {
          await doc.ref.update({
            members: firebase.firestore.FieldValue.arrayRemove(
              currentUserDoc.username,
            ),
          });
        }
        await db.collection("users").doc(currentUserDoc.username).delete();
        await db.collection("tiers").doc(currentUserDoc.username).delete();
        await auth.currentUser.delete();
        logout();
      }

      function setupAttachments() {
        const attachMenu = document.getElementById("attachMenu");
        const attachBtn = document.getElementById("attachBtn");
        attachBtn.onclick = (e) => {
          e.stopPropagation();
          attachMenu.classList.toggle("show");
        };
        document.addEventListener("click", (e) => {
          if (!attachBtn.contains(e.target) && !attachMenu.contains(e.target))
            attachMenu.classList.remove("show");
        });
        function handleFileUpload(accept, type) {
          let input = document.createElement("input");
          input.type = "file";
          input.accept = accept;
          input.onchange = async (e) => {
            const file = e.target.files[0];
            if (file && currentChatId) {
              const storageRef = storage
                .ref()
                .child(`chatMedia/${currentChatId}/${Date.now()}_${file.name}`);
              await storageRef.put(file);
              const url = await storageRef.getDownloadURL();
              if (currentChatType === "friend")
                sendMediaMessage(currentChatId, type, url, file.name);
              else if (currentChatType === "group")
                sendGroupMediaMessage(currentChatId, type, url, file.name);
              else if (currentChatType === "hub")
                sendHubMediaMessage(currentChatId, type, url, file.name);
            }
            attachMenu.classList.remove("show");
          };
          input.click();
        }
        document.getElementById("attachImage").onclick = () =>
          handleFileUpload("image/*", "image");
        document.getElementById("attachVideo").onclick = () =>
          handleFileUpload("video/*", "video");
        document.getElementById("attachFile").onclick = () =>
          handleFileUpload("*/*", "file");
      }

          type: type,
          data: url,
          fileName: fileName,
          timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        });
        if (currentChatId === to && currentChatType === "friend")
          renderMessages(to);

      // Voice recording
      let mediaRecorder = null;
      let audioChunks = [];
      let isRecording = false;
      const voiceBtn = document.getElementById("voiceRecordBtn");
      voiceBtn.onclick = async () => {
        if (!currentChatId) {
          alert("Open a chat first");
          return;
        }
        if (isRecording) {
          mediaRecorder.stop();
          voiceBtn.classList.remove("recording-active");
          voiceBtn.innerHTML = '<i class="fas fa-microphone"></i>';
          isRecording = false;
        } else {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: true,
          });
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];
          mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
          mediaRecorder.onstop = async () => {
            const audioBlob = new Blob(audioChunks, { type: "audio/webm" });
            const storageRef = storage
              .ref()
              .child(`voiceMessages/${Date.now()}.webm`);
            await storageRef.put(audioBlob);
            const url = await storageRef.getDownloadURL();
            if (currentChatType === "friend")
              sendMediaMessage(currentChatId, "voice", url, "voice.webm");
            else if (currentChatType === "group")
              sendGroupMediaMessage(currentChatId, "voice", url, "voice.webm");
            else if (currentChatType === "hub")
              sendHubMediaMessage(currentChatId, "voice", url, "voice.webm");
            stream.getTracks().forEach((t) => t.stop());
          };
          mediaRecorder.start();
          voiceBtn.classList.add("recording-active");
          voiceBtn.innerHTML = '<i class="fas fa-stop"></i>';
          isRecording = true;
        }
      };

      // Tag system
      function showTagPopup() {
        const friends = currentUserDoc.friends || [];
        if (!friends.length) {
          alert("No friends to tag");
          return;
        }
        const popup = document.getElementById("tagSearchPopup");
        const list = document.getElementById("tagFriendsList");
        const search = document.getElementById("tagSearchInput");
        function render(searchTerm = "") {
          const filtered = friends.filter((f) =>
            f.toLowerCase().includes(searchTerm.toLowerCase()),
          );
          if (!filtered.length) {
            list.innerHTML =
              '<div style="padding:12px;text-align:center;color:#888;">No friends</div>';
            return;
          }
          list.innerHTML = filtered
            .map(
              (f) => `<div class="tag-friend-item" data-name="${f}">
      <div class="tag-friend-avatar">${f.charAt(0).toUpperCase()}</div>
      <div class="tag-friend-name">${f}</div>
    </div>`,
            )
            .join("");
          document.querySelectorAll(".tag-friend-item").forEach((item) => {
            item.onclick = () => {
              const name = item.getAttribute("data-name");
              const input = document.getElementById("messageInput");
              input.value += `@${name} `;
              input.focus();
              popup.classList.remove("show");
            };
          });
        }
        search.value = "";
        search.oninput = (e) => render(e.target.value);
        render("");
        popup.classList.add("show");
        search.focus();
        setTimeout(() => {
          document.addEventListener("click", function closePopup(e) {
            if (!popup.contains(e.target) && e.target.id !== "tagBtn") {
              popup.classList.remove("show");
              document.removeEventListener("click", closePopup);
            }
          });
        }, 100);
      }
