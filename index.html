<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Chatrix Cloud | Online & Typing</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2300d4ff'%3E%3Cpath d='M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V4c0-1.1-.9-2-2-2z'/%3E%3C/svg%3E"
    />
    <style>
      /* ===== FULL STYLES (same as previous, plus online dot) ===== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        background: #000;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      body.light-theme {
        background: #e0e0e0;
      }
      body.light-theme .phone {
        background: #ffffff;
      }
      body.light-theme .friend-item,
      body.light-theme .group-item,
      body.light-theme .hub-item,
      body.light-theme .header,
      body.light-theme .chapter-card,
      body.light-theme .request-item {
        background: #f5f5f5;
      }
      body.light-theme .friend-name,
      body.light-theme .hub-name {
        color: #1a1a1a;
      }
      body.light-theme .chat-messages {
        background: #fafafa;
      }
      body.light-theme .message-received {
        background: #e4e6eb;
        color: #050505;
      }
      .phone {
        width: 375px;
        height: 700px;
        background: #0a0a0a;
        border-radius: 40px;
        overflow: hidden;
        position: relative;
        box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
      }
      .tabs {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        display: flex;
        background: #121212;
        border-top: 1px solid #333;
        z-index: 10;
      }
      .tab {
        flex: 1;
        text-align: center;
        padding: 12px;
        color: #888;
        font-size: 20px;
        cursor: pointer;
        position: relative;
      }
      .tab.active {
        color: #00d4ff;
        border-top: 2px solid #00d4ff;
        background: #1a1a1a;
      }
      .tab span {
        font-size: 11px;
        display: block;
      }
      .tab-badge {
        position: absolute;
        top: 4px;
        right: 20px;
        background: #ff3b30;
        color: white;
        border-radius: 12px;
        padding: 2px 6px;
        font-size: 10px;
        min-width: 18px;
      }
      .screen {
        height: calc(100% - 50px);
        overflow-y: auto;
        display: none;
        padding: 16px;
      }
      .screen.active {
        display: block;
      }
      .header {
        background: #121212;
        padding: 12px;
        border-radius: 20px;
        margin-bottom: 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }
      .header-left {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 1;
      }
      .header-right {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .app-logo {
        width: 32px;
        height: 32px;
        background: #00d4ff;
        border-radius: 50%;
        position: relative;
        animation: float 2s ease-in-out infinite;
      }
      .app-logo .eyes {
        position: absolute;
        top: 8px;
        left: 6px;
        right: 6px;
        display: flex;
        justify-content: space-between;
      }
      .app-logo .eyes span {
        width: 6px;
        height: 6px;
        background: #0a0a0a;
        border-radius: 50%;
      }
      .app-logo .mouth {
        position: absolute;
        bottom: 6px;
        left: 50%;
        transform: translateX(-50%);
        width: 8px;
        height: 4px;
        background: #0a0a0a;
        border-radius: 0 0 4px 4px;
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-2px);
        }
      }
      .logo-text {
        font-size: 20px;
        font-weight: bold;
        background: linear-gradient(135deg, #00d4ff, #0088ff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .user-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: #1a2a3a;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        color: #00d4ff;
        overflow: hidden;
        background-size: cover;
        cursor: pointer;
      }
      .icon-btn,
      .exit-btn {
        background: rgba(0, 212, 255, 0.2);
        border: 1px solid #00d4ff;
        color: #00d4ff;
        padding: 6px 10px;
        border-radius: 20px;
        font-size: 12px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        text-decoration: none;
      }
      .download-btn,
      .video-call-btn {
        background: #00d4ff;
        color: black;
        border: none;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 12px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        text-decoration: none;
        font-weight: bold;
      }
      .exit-btn {
        background: rgba(255, 60, 60, 0.3);
        border: none;
        color: white;
      }
      .add-friend,
      .new-chapter {
        background: rgba(0, 212, 255, 0.15);
        border: 1px solid #00d4ff;
        color: #00d4ff;
        padding: 10px;
        border-radius: 30px;
        width: 100%;
        margin-bottom: 12px;
        cursor: pointer;
        text-align: center;
      }
      .new-chapter {
        background: #00d4ff;
        color: black;
        font-weight: bold;
      }
      .prompt-box {
        background: linear-gradient(135deg, #00d4ff22, #0088ff22);
        border-radius: 20px;
        padding: 20px;
        text-align: center;
        margin-bottom: 16px;
        border: 1px solid #00d4ff44;
      }
      .friend-item,
      .group-item,
      .hub-item,
      .request-item,
      .leaderboard-item,
      .winner-card {
        display: flex;
        align-items: center;
        padding: 12px;
        background: #121212;
        margin-bottom: 8px;
        border-radius: 16px;
        cursor: pointer;
        position: relative;
      }
      .friend-avatar,
      .group-avatar,
      .hub-avatar,
      .request-avatar {
        width: 50px;
        height: 50px;
        background: #1a2a3a;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        margin-right: 12px;
        overflow: hidden;
        background-size: cover;
        background-position: center;
        position: relative;
      }
      .online-dot {
        position: absolute;
        bottom: 2px;
        right: 2px;
        width: 12px;
        height: 12px;
        background-color: #00ff00;
        border-radius: 50%;
        border: 2px solid #121212;
      }
      .friend-name {
        color: white;
        font-weight: bold;
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }
      .friend-preview {
        color: #888;
        font-size: 12px;
        margin-top: 4px;
      }
      .notification-badge {
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        background: #ff3b30;
        color: white;
        border-radius: 12px;
        padding: 2px 8px;
        font-size: 11px;
      }
      .list-badge {
        background: #ff3b30;
        color: white;
        border-radius: 12px;
        padding: 2px 8px;
        font-size: 11px;
        margin-left: 8px;
      }
      .tier-badge {
        background: linear-gradient(135deg, #ffd700, #ff8c00);
        color: #000;
        font-weight: bold;
        padding: 2px 8px;
        border-radius: 20px;
        font-size: 11px;
        margin-left: 8px;
      }
      .leaderboard-rank {
        font-weight: bold;
        font-size: 18px;
        margin-right: 12px;
        color: #ffd700;
        min-width: 30px;
      }
      .chat-view {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0a0a0a;
        z-index: 20;
        transform: translateX(100%);
        transition: 0.3s;
        display: flex;
        flex-direction: column;
      }
      .chat-view.open {
        transform: translateX(0);
      }
      .chat-header {
        background: #00d4ff;
        padding: 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        color: black;
        font-weight: bold;
      }
      .chat-header-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .chat-header-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        overflow: hidden;
        background-size: cover;
      }
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .message-bubble {
        max-width: 80%;
        padding: 8px 12px;
        border-radius: 20px;
        word-break: break-word;
        position: relative;
      }
      .message-sent {
        background: #00d4ff;
        color: black;
        align-self: flex-end;
      }
      .message-received {
        background: #2c2c2e;
        color: white;
        align-self: flex-start;
      }
      .message-time {
        font-size: 10px;
        opacity: 0.7;
        margin-top: 4px;
      }
      .message-sender-name {
        font-size: 11px;
        font-weight: bold;
        margin-bottom: 2px;
        color: #00d4ff;
      }
      .media-preview {
        max-width: 200px;
        max-height: 200px;
        border-radius: 12px;
        cursor: pointer;
        margin-top: 5px;
      }
      .file-message {
        background: rgba(0, 212, 255, 0.2);
        padding: 8px 12px;
        border-radius: 12px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .voice-message {
        background: rgba(0, 212, 255, 0.2);
        padding: 8px 12px;
        border-radius: 20px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .gif-message img {
        max-width: 200px;
        max-height: 200px;
        border-radius: 12px;
        cursor: pointer;
        margin-top: 5px;
      }
      .chat-input {
        display: flex;
        padding: 12px;
        gap: 8px;
        background: #1c1c1e;
        border-top: 1px solid #333;
        flex-wrap: wrap;
        align-items: center;
      }
      .chat-input input {
        flex: 1;
        background: #2c2c2e;
        border: none;
        border-radius: 25px;
        padding: 10px;
        color: white;
        outline: none;
      }
      .chat-input button {
        background: #00d4ff;
        border: none;
        border-radius: 25px;
        padding: 10px 18px;
        font-weight: bold;
        cursor: pointer;
        color: black;
        transition: opacity 0.2s;
      }
      .chat-input button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .attach-btn,
      .tag-btn,
      .emoji-btn,
      .voice-record-btn,
      .gif-btn {
        background: #2c2c2e;
        border: none;
        border-radius: 25px;
        padding: 10px 14px;
        color: white;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      .attach-btn:disabled,
      .tag-btn:disabled,
      .emoji-btn:disabled,
      .voice-record-btn:disabled,
      .gif-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .emoji-picker,
      .tag-search-popup,
      .attach-menu,
      .gif-picker {
        position: absolute;
        bottom: 70px;
        left: 12px;
        background: #1c1c1e;
        border-radius: 20px;
        padding: 12px;
        z-index: 40;
        border: 1px solid #00d4ff55;
        display: none;
      }
      .emoji-picker.show {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 8px;
        max-width: 300px;
        max-height: 200px;
        overflow-y: auto;
      }
      .tag-search-popup.show {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-width: 200px;
        max-height: 250px;
        overflow-y: auto;
      }
      .attach-menu.show {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        min-width: 200px;
      }
      .gif-picker.show {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-width: 280px;
        max-height: 300px;
        overflow-y: auto;
      }
      .gif-search-input {
        width: 100%;
        padding: 8px;
        border-radius: 20px;
        border: none;
        background: #2c2c2e;
        color: white;
        outline: none;
      }
      .gif-results {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        max-height: 200px;
        overflow-y: auto;
      }
      .gif-result {
        width: 80px;
        height: 80px;
        object-fit: cover;
        border-radius: 10px;
        cursor: pointer;
      }
      .tag-search-input {
        width: 100%;
        padding: 8px;
        border-radius: 20px;
        border: none;
        background: #2c2c2e;
        color: white;
        outline: none;
      }
      .tag-friend-item {
        padding: 8px 12px;
        cursor: pointer;
        border-radius: 10px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .tag-friend-item:hover {
        background: #00d4ff33;
      }
      .emoji-option {
        background: #1c1c1e;
        border: none;
        border-radius: 40px;
        padding: 8px;
        cursor: pointer;
        font-size: 20px;
      }
      .chapter-card {
        background: #1a1a1a;
        border-radius: 20px;
        padding: 16px;
        margin-bottom: 16px;
        border-left: 4px solid #00d4ff;
        cursor: pointer;
        position: relative;
      }
      .chapter-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }
      .chapter-avatar {
        width: 40px;
        height: 40px;
        background: #1a2a3a;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
      }
      .chapter-user {
        font-weight: bold;
        color: white;
      }
      .chapter-time {
        font-size: 10px;
        color: #888;
      }
      .chapter-text {
        color: #ccc;
        font-size: 14px;
        margin-top: 8px;
      }
      .chapter-stats {
        display: flex;
        gap: 16px;
        margin-top: 12px;
        font-size: 13px;
        color: #888;
      }
      .like-btn {
        background: none;
        border: none;
        color: #888;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .like-btn.liked {
        color: #ff4466;
      }
      .delete-chapter {
        position: absolute;
        top: 12px;
        right: 12px;
        background: rgba(255, 60, 60, 0.3);
        border: none;
        color: #ff6666;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 11px;
        cursor: pointer;
      }
      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .modal-card {
        background: #1c1c1e;
        border-radius: 30px;
        padding: 24px;
        width: 90%;
        text-align: center;
        border: 1px solid #00d4ff;
        max-height: 80%;
        overflow-y: auto;
      }
      .modal-card input,
      .modal-card textarea,
      .modal-card select {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        background: #2c2c2e;
        border: none;
        border-radius: 30px;
        color: white;
      }
      .modal-card button {
        background: #00d4ff;
        border: none;
        border-radius: 30px;
        padding: 12px;
        width: 100%;
        margin-top: 8px;
        font-weight: bold;
        cursor: pointer;
        color: black;
        transition: opacity 0.2s;
      }
      .modal-card button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .modal-card .danger-button {
        background: #ff4444;
        color: white;
      }
      .member-checkbox {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px;
        border-bottom: 0.5px solid #333;
      }
      .link {
        color: #00d4ff;
        margin-top: 12px;
        cursor: pointer;
        font-size: 12px;
      }
      .hidden {
        display: none !important;
      }
      .empty {
        text-align: center;
        color: #666;
        padding: 40px;
      }
      .small-btn {
        background: rgba(0, 212, 255, 0.15);
        border: 1px solid #00d4ff;
        color: #00d4ff;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 11px;
        cursor: pointer;
        margin-left: 8px;
      }
      .profile-pic {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: #1a2a3a;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
        margin: 0 auto 12px;
        overflow: hidden;
        background-size: cover;
      }
      .mention {
        color: #00d4ff;
        font-weight: bold;
        cursor: pointer;
        text-decoration: underline;
      }
      .mention-sender {
        color: #000000;
        font-weight: bold;
        cursor: pointer;
        text-decoration: underline;
      }
      .section-title {
        color: #00d4ff;
        margin: 16px 0 8px 0;
        font-size: 14px;
      }
      .winner-trophy {
        font-size: 24px;
        margin-right: 12px;
      }
      .leaderboard-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 12px;
        padding: 8px;
        background: #1a1a1a;
        border-radius: 16px;
        color: #00d4ff;
        font-weight: bold;
      }
      .recording-active {
        background: #ff4444 !important;
        color: white !important;
        animation: pulse 1s infinite;
      }
      @keyframes pulse {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.6;
        }
        100% {
          opacity: 1;
        }
      }
      .message-menu {
        position: absolute;
        right: 8px;
        top: 8px;
        cursor: pointer;
        font-size: 18px;
        color: #888;
      }
      .message-menu:hover {
        color: #00d4ff;
      }
      .quoted-message {
        background: rgba(255, 255, 255, 0.1);
        padding: 6px 10px;
        border-radius: 12px;
        margin-bottom: 6px;
        font-size: 12px;
        border-left: 3px solid #00d4ff;
        cursor: pointer;
      }
      .quoted-message:hover {
        background: rgba(0, 212, 255, 0.2);
      }
      .loading-indicator {
        display: inline-block;
        margin-left: 10px;
        font-size: 12px;
        color: #00d4ff;
        animation: blink 1s infinite;
      }
      @keyframes blink {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
        100% {
          opacity: 1;
        }
      }
      .forward-selector {
        max-height: 300px;
        overflow-y: auto;
      }
      .forward-item {
        padding: 10px;
        border-bottom: 1px solid #333;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .forward-item:hover {
        background: #00d4ff33;
      }
      .cancel-forward-btn {
        margin-top: 10px;
        background: #333;
      }
      .typing-indicator {
        font-size: 12px;
        color: #888;
        margin-left: 12px;
        font-style: italic;
        animation: fadeInOut 1s infinite;
      }
      @keyframes fadeInOut {
        0% {
          opacity: 0.6;
        }
        50% {
          opacity: 1;
        }
        100% {
          opacity: 0.6;
        }
      }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
  </head>
  <body>
    <div class="phone">
      <div class="tabs">
        <div
          class="tab active"
          data-tab="chats"
          onclick="window.showScreen('chats')"
        >
          <i class="fas fa-comment-dots"></i><span>Chats</span
          ><span id="chatsTabBadge" class="tab-badge hidden">0</span>
        </div>
        <div
          class="tab"
          data-tab="groups"
          onclick="window.showScreen('groups')"
        >
          <i class="fas fa-users"></i><span>Groups</span
          ><span id="groupsTabBadge" class="tab-badge hidden">0</span>

      // ==================== HELPER FUNCTIONS ====================
      function escapeHtml(str) {
        if (!str) return "";
        return String(str).replace(/[&<>]/g, (m) =>
          m === "&" ? "&amp;" : m === "<" ? "&lt;" : "&gt;",
        );
      }
      function formatTime(ts) {
        if (!ts) return "";
        const d = ts.toDate ? ts.toDate() : new Date(ts);
        return d.toLocaleTimeString();
      }
      function showScreen(screen) {
        document
          .querySelectorAll(".screen")
          .forEach((s) => s.classList.remove("active"));
        const target = document.getElementById(screen + "Screen");
        if (target) target.classList.add("active");
        document.querySelectorAll(".tab").forEach((tab) => {
          tab.classList.remove("active");
          if (tab.getAttribute("data-tab") === screen)
            tab.classList.add("active");
        });
      }
      window.showScreen = showScreen;

        document.getElementById(id).classList.add("hidden");

      // ==================== ONLINE STATUS ====================
      async function setOnlineStatus(userId, isOnline) {
        if (!userId) return;
        await db.collection("presence").doc(userId).set({
          online: isOnline,
          lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
        });
      }
      async function setupPresence() {
        if (!currentUserDoc) return;
        const userStatusRef = db
          .collection("presence")
          .doc(currentUserDoc.username);
        await userStatusRef.set({
          online: true,
          lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
        });
        const onDisconnect = userStatusRef.onDisconnect();
        await onDisconnect.set({
          online: false,
          lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
        });
      }
      async function getOnlineStatus(userId) {
        const doc = await db.collection("presence").doc(userId).get();
        return doc.exists ? doc.data().online : false;
      }
      function renderOnlineDot(isOnline) {
        return isOnline ? `<span class="online-dot"></span>` : "";
      }

      // ==================== TYPING INDICATOR (PRIVATE + GROUPS) ====================
      function subscribeToTyping(chatId, chatType) {
        if (typingUnsubscribe) typingUnsubscribe();
        const typingRef = db.collection("typing").doc(chatId);
        typingUnsubscribe = typingRef.onSnapshot((doc) => {
          if (
            doc.exists &&
            doc.data().user !== currentUserDoc.username &&
            doc.data().isTyping
          ) {
            const typingIndicator = document.getElementById("typingIndicator");
            if (typingIndicator) {
              typingIndicator.innerText = "typing...";
              typingIndicator.style.display = "inline";
              clearTimeout(typingTimeout);
              typingTimeout = setTimeout(() => {
                typingIndicator.style.display = "none";
              }, 2000);
            }
          } else {
            const typingIndicator = document.getElementById("typingIndicator");
            if (typingIndicator) typingIndicator.style.display = "none";
          }
        });
        unsubscribeListeners.push(typingUnsubscribe);
      }
      async function sendTypingIndicator(chatId, isTyping) {
        if (!currentUserDoc) return;
        const typingRef = db.collection("typing").doc(chatId);
        if (isTyping) {
          await typingRef.set({
            user: currentUserDoc.username,
            isTyping: true,
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
          });
          // Auto-clear after 2 seconds of no typing
          if (typingTimeout) clearTimeout(typingTimeout);
          typingTimeout = setTimeout(async () => {
            await typingRef.delete();
          }, 2000);
        } else {
          await typingRef.delete();
        }
      }

      // ==================== MARK MESSAGES AS READ ====================
      async function markMessagesAsRead(chatId, chatType, otherUser = null) {
        if (chatType === "friend" && otherUser) {
          const chatDocId = [currentUserDoc.username, otherUser]
            .sort()
            .join("_");
          const messagesSnap = await db
            .collection("messages")
            .doc(chatDocId)
            .collection("chat")
            .where("from", "==", otherUser)
            .where("read", "==", false)
            .get();
          const batch = db.batch();
          messagesSnap.forEach((doc) => {
            batch.update(doc.ref, { read: true });
          });
          await batch.commit();
        } else if (chatType === "group") {
          const messagesSnap = await db
            .collection("groupMessages")
            .doc(chatId)
            .collection("chat")
            .where("from", "!=", currentUserDoc.username)
            .where("read", "==", false)
            .get();
          const batch = db.batch();
          messagesSnap.forEach((doc) => {
            batch.update(doc.ref, { read: true });
          });
          await batch.commit();
        } else if (chatType === "hub") {
          const messagesSnap = await db
            .collection("hubMessages")
            .doc(chatId)
            .collection("chat")
            .where("from", "!=", currentUserDoc.username)
            .where("read", "==", false)
            .get();
          const batch = db.batch();
          messagesSnap.forEach((doc) => {
            batch.update(doc.ref, { read: true });
          });
          await batch.commit();
        }
        refreshAllUI();
      }

      // ==================== AUTH & USER ====================
      async function doLogin() {
        const username = document
          .getElementById("loginUser")
          .value.trim()
          .toLowerCase();
        const password = document.getElementById("loginPass").value;
        if (!username || !password) {
          alert("Enter username and password");
          return;
        }
        const btn = document.getElementById("loginBtn");
        const originalText = btn.innerText;
        btn.innerText = "Logging in...";
        btn.disabled = true;
        try {
          const email = username + "@chatrix.local";
          await auth.signInWithEmailAndPassword(email, password);
          await loadCurrentUserData(username);
          document.getElementById("loginModal").classList.add("hidden");
          startRealtimeListeners();
          setupPresence();
          updateAvatar();
          showScreen("chats");
          deleteOldChapters();
        } catch (err) {
          alert(
            "Invalid username or password. Make sure Firebase rules are set to allow read/write.",
          );
        } finally {
          btn.innerText = originalText;
          btn.disabled = false;
        }
      }
      async function doSignup() {
        const username = document
          .getElementById("signupUser")
          .value.trim()
          .toLowerCase();
        const password = document.getElementById("signupPass").value;
        const confirm = document.getElementById("signupConfirm").value;
        if (!username || !password) {
          alert("Username and password required");
          return;
        }
        if (password !== confirm) {
          alert("Passwords don't match");
          return;
        }
        if (password.length < 6) {
          alert("Password must be at least 6 characters");
          return;
        }
        const btn = document.getElementById("signupBtn");
        const originalText = btn.innerText;
        btn.innerText = "Creating account...";
        btn.disabled = true;
        try {
          const userDoc = await db.collection("users").doc(username).get();
          if (userDoc.exists) {
            alert("Username already taken");
            return;
          }
          const email = username + "@chatrix.local";
          await auth.createUserWithEmailAndPassword(email, password);
          await db.collection("users").doc(username).set({
            username: username,
            displayName: username,
            friends: [],
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          });
          await db
            .collection("tiers")
            .doc(username)
            .set({
              tier: 0,
              lastPostDate: null,
              streak: 0,
              weeklyChapters: 0,
              monthlyChapters: 0,
              weekReset: getWeekStart(new Date()),
              monthReset: new Date(
                new Date().getFullYear(),
                new Date().getMonth(),
                1,
              ).toDateString(),
            });
          alert("Account created! Please log in.");
          document.getElementById("signupModal").classList.add("hidden");
          document.getElementById("loginModal").classList.remove("hidden");
        } catch (err) {
          alert("Signup failed: " + err.message);
        } finally {
          btn.innerText = originalText;
          btn.disabled = false;
        }
      }
      async function loadCurrentUserData(username) {
        const doc = await db.collection("users").doc(username).get();
        if (doc.exists) {
          currentUserDoc = { id: doc.id, ...doc.data() };
          const blockedDoc = await db.collection("blocked").doc(username).get();
          if (blockedDoc.exists)
            blockedUsers = new Set(blockedDoc.data().list || []);
          else blockedUsers.clear();
        } else {
          await db.collection("users").doc(username).set({
            username: username,
            displayName: username,
            friends: [],
          });
          currentUserDoc = {
            id: username,
            username,
            displayName: username,
            friends: [],
          };
          blockedUsers.clear();
        }
      }
      function logout() {
        if (currentUserDoc) {
          setOnlineStatus(currentUserDoc.username, false);
        }
        auth
          .signOut()
          .then(() => {
            currentUser = null;
            currentUserDoc = null;
            currentChatId = null;
            unsubscribeListeners.forEach((fn) => fn());
            unsubscribeListeners = [];
            document
              .querySelectorAll(".screen")
              .forEach((s) => s.classList.remove("active"));
            const loginModal = document.getElementById("loginModal");
            if (loginModal) loginModal.classList.remove("hidden");
          })
          .catch((err) => console.error("Logout error:", err));
      }
      window.logout = logout;

      // ==================== BLOCK / UNBLOCK ====================
      async function blockUser(username) {
        if (!currentUserDoc) return;
        blockedUsers.add(username);
        await db
          .collection("blocked")
          .doc(currentUserDoc.username)
          .set({ list: Array.from(blockedUsers) });
        if (currentUserDoc.friends.includes(username)) {
          await db
            .collection("users")
            .doc(currentUserDoc.username)
            .update({
              friends: firebase.firestore.FieldValue.arrayRemove(username),
            });
          await db
            .collection("users")
            .doc(username)
            .update({
              friends: firebase.firestore.FieldValue.arrayRemove(
                currentUserDoc.username,
              ),
            });
        }
        refreshAllUI();
        alert(`Blocked ${username}`);
      }
      async function unblockUser(username) {
        if (!currentUserDoc) return;
        blockedUsers.delete(username);
        await db
          .collection("blocked")
          .doc(currentUserDoc.username)
          .set({ list: Array.from(blockedUsers) });
        refreshAllUI();
        alert(`Unblocked ${username}`);
      }
      window.blockUser = blockUser;
      window.unblockUser = unblockUser;

      // ==================== REAL-TIME LISTENERS ====================
      function startRealtimeListeners() {
        if (!currentUserDoc) return;
        unsubscribeListeners.forEach((fn) => fn());
        unsubscribeListeners = [];

        const userUnsub = db
          .collection("users")
          .doc(currentUserDoc.username)
          .onSnapshot((doc) => {
            if (doc.exists) currentUserDoc = { id: doc.id, ...doc.data() };
            renderFriends();
            renderPendingRequests();
            updateBadges();
          });
        unsubscribeListeners.push(userUnsub);

        const groupsUnsub = db
          .collection("groups")
          .where("members", "array-contains", currentUserDoc.username)
          .onSnapshot((snapshot) => {
            groupsCache = [];
            snapshot.forEach((doc) =>
              groupsCache.push({ id: doc.id, ...doc.data() }),
            );
            renderGroups();
          });
        unsubscribeListeners.push(groupsUnsub);

        const hubsUnsub = db
          .collection("hubs")
          .where("members", "array-contains", currentUserDoc.username)
          .onSnapshot((snapshot) => {
            hubsCache = [];
            snapshot.forEach((doc) =>
              hubsCache.push({ id: doc.id, ...doc.data() }),
            );
            renderHubs();
          });
        unsubscribeListeners.push(hubsUnsub);

        const chaptersUnsub = db
          .collection("chapters")
          .orderBy("timestamp", "desc")
          .onSnapshot((snapshot) => {
            chaptersCache = [];
            snapshot.forEach((doc) =>
              chaptersCache.push({ id: doc.id, ...doc.data() }),
            );
            renderChapters();
            updateBadges();
          });
        unsubscribeListeners.push(chaptersUnsub);

        const tiersUnsub = db.collection("tiers").onSnapshot(() => {
          renderLeaderboard();
          renderWinners();
        });
        unsubscribeListeners.push(tiersUnsub);

        const reqUnsub = db
          .collection("friendRequests")
          .where("to", "==", currentUserDoc.username)
          .where("status", "==", "pending")
          .onSnapshot(() => renderPendingRequests());
        unsubscribeListeners.push(reqUnsub);
      }

      // ==================== MESSAGE HELPERS ====================
      function getMessagePreview(m) {
        if (m.type === "image") return "📷 Image";
        if (m.type === "video") return "🎥 Video";
        if (m.type === "file") return `📎 ${m.fileName || "File"}`;
        if (m.type === "voice") return "🎤 Voice message";
        if (m.type === "gif") return "🎞️ GIF";
        return m.text
          ? m.text.length > 50
            ? m.text.substring(0, 50) + "..."
            : m.text
          : "Message";
      }

      async function jumpToOriginalMessage(
        originalMsgId,
        originalChatId,
        originalChatType,
      ) {
        if (currentChatId) closeChat();
        await openChat(originalChatId, originalChatType);
        setTimeout(() => {
          const targetElement = document.querySelector(
            `.message-bubble-content[data-msg-id="${originalMsgId}"]`,
          );
          if (targetElement) {
            targetElement.scrollIntoView({
              behavior: "smooth",
              block: "center",
            });
            targetElement.style.backgroundColor = "#ffcc00";
            setTimeout(() => {
              targetElement.style.backgroundColor = "";
            }, 2000);
          } else {
            alert("Original message not found in this chat");
          }
        }, 1000);
      }

      function renderMessagesWithMentions(text, isSender) {
        const mentionRegex = /@([a-zA-Z0-9_]+)/g;
        const mentionClass = isSender ? "mention-sender" : "mention";
        return text.replace(mentionRegex, (match, username) => {
          return `<span class="${mentionClass}" data-username="${escapeHtml(username)}">${escapeHtml(match)}</span>`;
        });
      }
      async function handleMentionClick(username) {
        if (!currentUserDoc) return;
        if (username === currentUserDoc.username) {
          alert("You mentioned yourself");
          return;
        }
        if (blockedUsers.has(username)) {
          alert("You have blocked this user.");
          return;
        }
        if (currentUserDoc.friends.includes(username)) {
          openChat(username, "friend");
        } else {
          const existingReq = await db
            .collection("friendRequests")
            .where("from", "==", currentUserDoc.username)
            .where("to", "==", username)
            .where("status", "==", "pending")
            .get();
          if (!existingReq.empty) {
            alert(`Friend request already sent to ${username}`);
            return;
          }
          await db.collection("friendRequests").add({
            from: currentUserDoc.username,
            to: username,
            status: "pending",
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
          });
          alert(`Friend request sent to ${username}`);
        }
      }
      function attachMentionClickHandlers() {
        document.querySelectorAll(".mention, .mention-sender").forEach((el) => {
          el.onclick = null;
          el.onclick = (e) => {
            e.stopPropagation();
            const username = el.getAttribute("data-username");
            if (username) handleMentionClick(username);
          };
        });
      }
      function renderMediaContent(
        m,
        chatType,
        showSender = false,
        senderName = "",
        messageId = null,
        originalMsg = null,
      ) {
        let content = "";
        let quotedHtml = "";
        if (originalMsg) {
          const preview = getMessagePreview(originalMsg);
          quotedHtml = `<div class="quoted-message" data-msg-id="${originalMsg.id}" data-chat-id="${originalMsg.chatId}" data-chat-type="${originalMsg.chatType}">↩️ ${escapeHtml(preview)}</div>`;
        }
        if (m.type === "image")
          content = `<img src="${m.data}" class="media-preview" onclick="window.showImagePreview('${m.data}')">`;
        else if (m.type === "video")
          content = `<video controls class="media-preview"><source src="${m.data}"></video>`;
        else if (m.type === "file")
          content = `<div class="file-message"><i class="fas fa-file"></i> <a href="${m.data}" target="_blank">${m.fileName || "Download"}</a></div>`;
        else if (m.type === "voice")
          content = `<div class="voice-message"><i class="fas fa-microphone"></i> <audio controls src="${m.data}"></audio></div>`;
        else if (m.type === "gif")
          content = `<div class="gif-message"><img src="${m.data}" class="media-preview" onclick="window.showImagePreview('${m.data}')"></div>`;
        else
          content = renderMessagesWithMentions(
            escapeHtml(m.text),
            m.from === currentUserDoc?.username,
          );

        let senderHtml = "";
        if (
          showSender &&
          senderName &&
          m.from !== currentUserDoc?.username &&
          chatType === "group"
        ) {
          senderHtml = `<div class="message-sender-name">${escapeHtml(senderName)}</div>`;
        }
        const menuHtml = `<div class="message-menu" data-msg-id="${messageId}" data-msg-type="${m.type || "text"}" data-msg-text="${escapeHtml(m.text || "")}" data-msg-data="${m.data || ""}" data-msg-file="${m.fileName || ""}" data-msg-from="${m.from}" data-msg-time="${m.timestamp}"><i class="fas fa-ellipsis-v"></i></div>`;
        return `<div class="message-bubble-content" style="position:relative;" data-msg-id="${messageId}" ondblclick="window.editOrDeleteMessage('${messageId}', '${m.from}', '${escapeHtml(m.text || "").replace(/'/g, "\\'")}')">${menuHtml}${quotedHtml}${senderHtml}${content}</div>`;
      }
      window.editOrDeleteMessage = async function (
        msgId,
        msgFrom,
        currentText,
      ) {
        if (msgFrom !== currentUserDoc.username) {
          alert("You can only edit or delete your own messages.");
          return;
        }
        const action = prompt(
          "Edit or Delete?\nType 'edit' to edit, 'delete' to delete.",
        );
        if (action === null) return;
        if (action.toLowerCase() === "delete") {
          if (confirm("Delete this message?")) {
            if (currentChatType === "friend") {
              const chatId = [currentUserDoc.username, currentChatId]
                .sort()
                .join("_");
              await db
                .collection("messages")
                .doc(chatId)
                .collection("chat")
                .doc(msgId)
                .delete();
            } else if (currentChatType === "group") {
              await db
                .collection("groupMessages")
                .doc(currentChatId)
                .collection("chat")
                .doc(msgId)
                .delete();
            } else if (currentChatType === "hub") {
              await db
                .collection("hubMessages")
                .doc(currentChatId)
                .collection("chat")
                .doc(msgId)
                .delete();
            }
            alert("Message deleted.");
          }
        } else if (action.toLowerCase() === "edit") {
          const newText = prompt("Edit your message:", currentText);
          if (newText && newText !== currentText) {
            if (currentChatType === "friend") {
              const chatId = [currentUserDoc.username, currentChatId]
                .sort()
                .join("_");
              await db
                .collection("messages")
                .doc(chatId)
                .collection("chat")
                .doc(msgId)
                .update({ text: newText });
            } else if (currentChatType === "group") {
              await db
                .collection("groupMessages")
                .doc(currentChatId)
                .collection("chat")
                .doc(msgId)
                .update({ text: newText });
            } else if (currentChatType === "hub") {
              await db
                .collection("hubMessages")
                .doc(currentChatId)
                .collection("chat")
                .doc(msgId)
                .update({ text: newText });
            }
            alert("Message updated.");
          }
        } else {
          alert("Invalid option. Please type 'edit' or 'delete'.");
        }
      };
      function attachMessageMenuHandlers() {
        document.querySelectorAll(".message-menu").forEach((el) => {
          el.onclick = (e) => {
            e.stopPropagation();
            const msgId = el.getAttribute("data-msg-id");

              fileName: msgFile,

              timestamp: msgTime,
            };
            const action = confirm(
              "Reply or Forward?\n\nOK = Reply\nCancel = Forward",
            );

              replyToMessage = {
                id: msg.id,
                chatId: currentChatId,

              quoteDiv.style.padding = "6px 12px";
              quoteDiv.style.cursor = "pointer";

              quoteDiv.onclick = () => {
                jumpToOriginalMessage(msg.id, currentChatId, currentChatType);

              inputArea.insertBefore(quoteDiv, inputArea.firstChild);

        document.querySelectorAll(".quoted-message").forEach((el) => {

            el.setAttribute("data-listener", "true");

              const targetMsgId = el.getAttribute("data-msg-id");

              if (targetMsgId && targetChatId && targetChatType) {
                jumpToOriginalMessage(
                  targetMsgId,
                  targetChatId,
                  targetChatType,
                );
              }
            };
          }
        });
      }
      function showForwardSelector(msg) {
        let destinations = [];
        currentUserDoc.friends.forEach((f) => {
          if (!blockedUsers.has(f)) {
            destinations.push({
              id: f,
              name: f,
              type: "friend",
              display: `👤 ${f}`,
            });
          }
        });
        groupsCache.forEach((g) => {
          destinations.push({
            id: g.id,
            name: g.name,
            type: "group",
            display: `👥 ${g.name}`,
          });
        });
        hubsCache.forEach((h) => {
          if (h.creator === currentUserDoc.username) {
            destinations.push({
              id: h.id,
              name: h.name,
              type: "hub",
              display: `📡 ${h.name}`,
            });
          }
        });
        let listHtml = `<div class="forward-selector"><p style="margin-bottom:10px;">Click a destination to forward:</p>`;
        destinations.forEach((d) => {
          listHtml += `<div class="forward-item" data-id="${d.id}" data-type="${d.type}">${d.display}</div>`;
        });
        listHtml += `<button id="cancelForwardBtn" class="small-btn" style="margin-top:10px; width:100%;">Cancel</button></div>`;
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.style.display = "flex";
        modal.innerHTML = `<div class="modal-card">${listHtml}</div>`;
        document.body.appendChild(modal);
        modal.querySelectorAll(".forward-item").forEach((item) => {
          item.onclick = async () => {
            const targetId = item.getAttribute("data-id");
            const targetType = item.getAttribute("data-type");
            await forwardMessage(msg, targetId, targetType);
            modal.remove();
            alert("Message forwarded!");
          };
        });
        modal.querySelector("#cancelForwardBtn").onclick = () => modal.remove();
      }
      async function forwardMessage(msg, targetId, targetType) {
        let forwardText = `(Forwarded from ${currentUserDoc.displayName}) `;
        if (msg.type === "text") {
          forwardText += msg.text;
          await sendTextMessageToTarget(targetId, targetType, forwardText);
        } else {
          await sendMediaToTarget(
            targetId,
            targetType,
            msg.type,
            msg.data,
            msg.fileName,
          );
        }
      }
      async function sendTextMessageToTarget(targetId, targetType, text) {
        if (targetType === "friend") {
          if (blockedUsers.has(targetId)) return;
          const chatId = [currentUserDoc.username, targetId].sort().join("_");
          await db.collection("messages").doc(chatId).collection("chat").add({
            from: currentUserDoc.username,
            text: text,
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            read: false,
          });
        } else if (targetType === "group") {
          await db
            .collection("groupMessages")
            .doc(targetId)
            .collection("chat")
            .add({
              from: currentUserDoc.username,
              text: text,
              timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            });
        } else if (targetType === "hub") {
          const hub = hubsCache.find((h) => h.id == targetId);
          if (hub && hub.creator === currentUserDoc.username) {
            await db
              .collection("hubMessages")
              .doc(targetId)
              .collection("chat")
              .add({
                from: currentUserDoc.username,
                text: text,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
              });
          } else {
            alert("You cannot forward to this hub (not creator).");
          }
        }
      }

      // ==================== FRIENDS & CHAT ====================
      async function renderFriends() {
        if (!currentUserDoc) return;
        let friendsList = currentUserDoc.friends || [];
        friendsList = friendsList.filter((f) => !blockedUsers.has(f));
        const container = document.getElementById("friendsList");
        if (!container) return;
        if (friendsList.length === 0) {
          container.innerHTML =
            '<div class="empty">No friends yet. Add some!</div>';
          return;
        }
        let html = "";
        for (const friendId of friendsList) {
          const friendDoc = await db.collection("users").doc(friendId).get();
          const friendName = friendDoc.exists
            ? friendDoc.data().displayName
            : friendId;
          const friendPic = friendDoc.exists
            ? friendDoc.data().profilePic
            : null;
          const unread =
            messagesCache[currentUserDoc.username]?.[friendId]?.filter(
              (m) => m.from === friendId && !m.read,
            ).length || 0;
          const online = await getOnlineStatus(friendId);
          const avatarStyle = friendPic
            ? `style="background-image: url(${friendPic}); background-size: cover;"`
            : "";
          html += `<div class="friend-item" onclick="window.openChat('${friendId}','friend')">
      <div class="friend-avatar" ${avatarStyle}>${!friendPic ? "👤" : ""}${renderOnlineDot(online)}</div>
      <div style="flex:1"><div class="friend-name">${escapeHtml(friendName)}</div><div class="friend-preview">Say hello</div></div>
      ${unread > 0 ? `<div class="list-badge">${unread}</div>` : ""}
      <div style="display:flex; gap:4px; margin-left:8px;">
        <button class="small-btn" onclick="event.stopPropagation();window.blockUser('${friendId}')">Block</button>
        <button class="small-btn" onclick="event.stopPropagation();window.deleteChatWith('${friendId}')">Delete</button>
        <button class="small-btn" onclick="event.stopPropagation();window.clearChatWith('${friendId}')">Clear</button>
      </div>
    </div>`;
        }
        container.innerHTML = html;
      }
      window.deleteChatWith = async function (friend) {
        if (
          confirm(
            `Delete chat with ${friend}? This will remove them from your friends list and delete all messages.`,
          )
        ) {
          await db
            .collection("users")
            .doc(currentUserDoc.username)
            .update({
              friends: firebase.firestore.FieldValue.arrayRemove(friend),
            });
          await db
            .collection("users")
            .doc(friend)
            .update({
              friends: firebase.firestore.FieldValue.arrayRemove(
                currentUserDoc.username,
              ),
            });
          const chatId = [currentUserDoc.username, friend].sort().join("_");
          const msgs = await db
            .collection("messages")
            .doc(chatId)
            .collection("chat")
            .get();
          const batch = db.batch();
          msgs.forEach((doc) => batch.delete(doc.ref));
          await batch.commit();
          await db.collection("messages").doc(chatId).delete();
          if (currentChatId === friend) closeChat();
          refreshAllUI();
          alert(`Chat with ${friend} deleted.`);
        }
      };
      window.clearChatWith = async function (friend) {
        if (
          confirm(
            `Clear your side of the chat with ${friend}? This only deletes messages from your view.`,
          )
        ) {
          const chatId = [currentUserDoc.username, friend].sort().join("_");
          const msgs = await db
            .collection("messages")
            .doc(chatId)
            .collection("chat")
            .get();
          const batch = db.batch();
          msgs.forEach((doc) => batch.delete(doc.ref));
          await batch.commit();
          if (currentChatId === friend) renderMessages(friend);
          refreshAllUI();
          alert("Chat cleared on your side.");
        }
      };
      async function renderMessages(friendId) {
        const chatId = [currentUserDoc.username, friendId].sort().join("_");
        const container = document.getElementById("chatMessages");
        if (!container) return;
        // Mark unread messages as read in Firestore
        await markMessagesAsRead(chatId, "friend", friendId);
        const idx = unsubscribeListeners.findIndex((l) => l._chatId === chatId);
        if (idx !== -1) {
          unsubscribeListeners[idx]();
          unsubscribeListeners.splice(idx, 1);
        }
        const unsubscribe = db
          .collection("messages")
          .doc(chatId)
          .collection("chat")
          .orderBy("timestamp")
          .onSnapshot((snapshot) => {
            const msgs = [];
            snapshot.forEach((doc) => msgs.push({ id: doc.id, ...doc.data() }));
            if (!messagesCache[currentUserDoc.username])
              messagesCache[currentUserDoc.username] = {};
            messagesCache[currentUserDoc.username][friendId] = msgs;
            if (msgs.length === 0) {
              container.innerHTML = '<div class="empty">No messages yet</div>';
              return;
            }
            container.innerHTML = msgs
              .map(
                (m) =>
                  `<div class="message-bubble ${m.from === currentUserDoc.username ? "message-sent" : "message-received"}">${renderMediaContent(m, "friend", false, "", m.id)}<div class="message-time">${formatTime(m.timestamp)}</div></div>`,
              )
              .join("");
            container.scrollTop = container.scrollHeight;
            attachMentionClickHandlers();
            attachMessageMenuHandlers();
            updateBadges();
          });
        unsubscribe._chatId = chatId;
        unsubscribeListeners.push(unsubscribe);
        // Subscribe to typing indicator for this private chat
        subscribeToTyping(chatId, "friend");
      }
      async function sendTextMessage(to, text) {
        if (!text.trim()) return;
        if (blockedUsers.has(to)) {
          alert("You cannot send messages to a blocked user.");
          return;
        }
        let finalText = text;
        if (replyToMessage) {
          finalText = `[Replying to: ${replyToMessage.preview}]\n${text}`;
          replyToMessage = null;
          const quotePreview = document.getElementById("quotePreview");
          if (quotePreview) quotePreview.remove();
        }
        const chatId = [currentUserDoc.username, to].sort().join("_");
        await db.collection("messages").doc(chatId).collection("chat").add({
          from: currentUserDoc.username,
          text: finalText,
          timestamp: firebase.firestore.FieldValue.serverTimestamp(),
          read: false,
        });
        // Send typing stopped
        await sendTypingIndicator(chatId, false);
      }
      async function sendMediaMessage(to, type, dataUrl, fileName) {
        if (blockedUsers.has(to)) return;
        const chatId = [currentUserDoc.username, to].sort().join("_");
        await db.collection("messages").doc(chatId).collection("chat").add({
          from: currentUserDoc.username,
          type: type,
          data: dataUrl,
          fileName: fileName,
          timestamp: firebase.firestore.FieldValue.serverTimestamp(),
          read: false,
        });
      }
      async function sendMessageWithLoading() {
        const input = document.getElementById("messageInput");
        const sendBtn = document.getElementById("sendMsgBtn");
        const text = input.value.trim();
        if (!text || !currentChatId) return;
        sendBtn.disabled = true;
        sendBtn.innerHTML = "Sending...";
        try {
          if (currentChatType === "friend") {
            await sendTextMessage(currentChatId, text);
          } else if (currentChatType === "group") {
            await sendGroupMessage(currentChatId, text);
          } else if (currentChatType === "hub") {
            await sendHubMessage(currentChatId, text);
          }
          input.value = "";
        } catch (err) {
          console.error(err);
          alert("Failed to send message.");
        } finally {
          sendBtn.disabled = false;
          sendBtn.innerHTML = "Send";
        }
      }
      window.sendMessage = sendMessageWithLoading;
      window.openChat = async function (id, type) {
        currentChatId = id;
        currentChatType = type;
        if (type === "friend") {
          if (blockedUsers.has(id)) {
            alert("You have blocked this user.");
            return;
          }
          document.getElementById("chatHeaderName").innerHTML = id;
          document.getElementById("chatHeaderAvatar").innerHTML = "👤";
          await renderMessages(id);
          document.getElementById("messageInput").disabled = false;
          document.getElementById("sendMsgBtn").disabled = false;
        } else if (type === "group") {
          const g = groupsCache.find((g) => g.id == id);
          document.getElementById("chatHeaderName").innerHTML = g
            ? g.name
            : "Group";
          document.getElementById("chatHeaderAvatar").innerHTML = g?.picUrl
            ? `<div style="background-image:url(${g.picUrl}); background-size:cover; width:100%; height:100%;"></div>`
            : "👥";
          await renderGroupMessages(id);
          document.getElementById("messageInput").disabled = false;
          document.getElementById("sendMsgBtn").disabled = false;
          subscribeToTyping(id, "group");
        } else if (type === "hub") {
          const h = hubsCache.find((h) => h.id == id);
          document.getElementById("chatHeaderName").innerHTML = h
            ? h.name
            : "Hub";
          document.getElementById("chatHeaderAvatar").innerHTML = h?.picUrl
            ? `<div style="background-image:url(${h.picUrl}); background-size:cover; width:100%; height:100%;"></div>`
            : "📡";
          await renderHubMessages(id);
          const canSend = h && h.creator === currentUserDoc.username;
          document.getElementById("messageInput").disabled = !canSend;
          document.getElementById("sendMsgBtn").disabled = !canSend;
          if (!canSend) alert("Only the hub creator can send messages.");
        }
        document.getElementById("chatView").classList.add("open");
      };
      function closeChat() {
        currentChatId = null;
        document.getElementById("chatView").classList.remove("open");
        if (replyToMessage) {
          replyToMessage = null;
          const quotePreview = document.getElementById("quotePreview");
          if (quotePreview) quotePreview.remove();
        }
        if (typingUnsubscribe) {
          typingUnsubscribe();
          typingUnsubscribe = null;
        }
      }
      window.closeChat = closeChat;

      // ==================== FRIEND REQUESTS ====================
      async function renderPendingRequests() {
        const requestsSnap = await db
          .collection("friendRequests")
          .where("to", "==", currentUserDoc.username)
          .where("status", "==", "pending")
          .get();
        const container = document.getElementById("pendingRequestsSection");
        if (!container) return;
        if (requestsSnap.empty) {
          container.innerHTML = "";

      async function deleteOldChapters() {

        const chaptersSnap = await db.collection("chapters").get();
        const batch = db.batch();
        let deletedCount = 0;
        chaptersSnap.forEach((doc) => {
          const data = doc.data();
          if (data.timestamp && data.timestamp.toDate() < twentyFourHoursAgo) {
            batch.delete(doc.ref);
            deletedCount++;

        });
        if (deletedCount > 0) {
          await batch.commit();
          console.log(`Deleted ${deletedCount} old chapters`);

      function getWeekStart(date) {
        const d = new Date(date);
        const day = d.getDay();
        const diff = d.getDate() - day + (day === 0 ? -6 : 1);
        return new Date(d.setDate(diff)).toDateString();
      }
      async function renderWinners() {
        const tiersSnap = await db.collection("tiers").get();
        let weeklyWinner = { username: null, count: 0 };
        let monthlyWinner = { username: null, count: 0 };
        const now = new Date();
        const currentWeekStart = getWeekStart(now);
        const currentMonthStart = new Date(
          now.getFullYear(),
          now.getMonth(),
          1,
        ).toDateString();
        for (const doc of tiersSnap.docs) {
          const data = doc.data();
          if (
            data.weekReset === currentWeekStart &&
            (data.weeklyChapters || 0) > weeklyWinner.count
          ) {
            weeklyWinner = { username: doc.id, count: data.weeklyChapters };
          }
          if (
            data.monthReset === currentMonthStart &&
            (data.monthlyChapters || 0) > monthlyWinner.count
          ) {
            monthlyWinner = { username: doc.id, count: data.monthlyChapters };
          }
        }
        const weeklyDiv = document.getElementById("weeklyWinnerBox");
        const monthlyDiv = document.getElementById("monthlyWinnerBox");
        if (weeklyWinner.username && usersCache[weeklyWinner.username]) {
          weeklyDiv.innerHTML = `<div class="winner-trophy">🏆</div><div><div class="friend-name">Weekly Champion</div><div class="friend-name" style="font-size:18px;">${usersCache[weeklyWinner.username].displayName}</div><div class="friend-preview">${weeklyWinner.count} chapters this week</div></div>`;
        } else {
          weeklyDiv.innerHTML = `<div class="winner-trophy">⏳</div><div><div class="friend-name">Weekly Champion</div><div class="friend-preview">No chapters yet this week</div></div>`;
        }
        if (monthlyWinner.username && usersCache[monthlyWinner.username]) {
          monthlyDiv.innerHTML = `<div class="winner-trophy">👑</div><div><div class="friend-name">Monthly Champion</div><div class="friend-name" style="font-size:18px;">${usersCache[monthlyWinner.username].displayName}</div><div class="friend-preview">${monthlyWinner.count} chapters this month</div></div>`;
        } else {
          monthlyDiv.innerHTML = `<div class="winner-trophy">⏳</div><div><div class="friend-name">Monthly Champion</div><div class="friend-preview">No chapters yet this month</div></div>`;
        }

      async function renderLeaderboard() {
        const tiersSnap = await db
          .collection("tiers")
          .orderBy("tier", "desc")
          .get();

        if (!container) return;
        if (tiersSnap.empty) {

        for (const doc of tiersSnap.docs) {

          const userDoc = await db.collection("users").doc(doc.id).get();
          const displayName = userDoc.exists

      async function deleteAccountWithLoading() {
        if (!confirm("Delete your account permanently? All data will be lost."))
          return;
        const btn = document.getElementById("deleteAccountBtn");
        const originalText = btn.innerText;
        btn.innerText = "Deleting...";
        btn.disabled = true;
        try {
          const friends = currentUserDoc.friends || [];
          for (const friend of friends) {
            await db
              .collection("users")
              .doc(friend)
              .update({
                friends: firebase.firestore.FieldValue.arrayRemove(
                  currentUserDoc.username,
                ),
              });
          }
          const requestsFrom = await db
            .collection("friendRequests")
            .where("from", "==", currentUserDoc.username)
            .get();
          requestsFrom.forEach((d) => d.ref.delete());
          const requestsTo = await db
            .collection("friendRequests")
            .where("to", "==", currentUserDoc.username)
            .get();
          requestsTo.forEach((d) => d.ref.delete());
          const groupsSnap = await db
            .collection("groups")
            .where("members", "array-contains", currentUserDoc.username)
            .get();
          for (const doc of groupsSnap.docs) {
            await doc.ref.update({
              members: firebase.firestore.FieldValue.arrayRemove(
                currentUserDoc.username,
              ),
            });
          }
          const hubsSnap = await db
            .collection("hubs")
            .where("members", "array-contains", currentUserDoc.username)
            .get();
          for (const doc of hubsSnap.docs) {
            await doc.ref.update({
              members: firebase.firestore.FieldValue.arrayRemove(
                currentUserDoc.username,
              ),
            });
          }
          await db.collection("users").doc(currentUserDoc.username).delete();
          await db.collection("tiers").doc(currentUserDoc.username).delete();
          await db.collection("blocked").doc(currentUserDoc.username).delete();
          await auth.currentUser.delete();
          logout();

          btn.innerText = originalText;
          btn.disabled = false;
        }

          isRecording = false;
        } else {
          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              audio: true,

            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.onstop = async () => {
              const audioBlob = new Blob(audioChunks, { type: "audio/webm" });

            f.toLowerCase().includes(term),
          );
          if (!filtered.length) {
            list.innerHTML =
              '<div style="padding:12px;text-align:center;color:#888;">No friends found</div>';
            return;
          }
          let html = "";

            html += `<div class="tag-friend-item" data-username="${escapeHtml(f)}" data-display="${escapeHtml(displayName)}">

        if (!query.trim()) return [];
        const url = `https://api.giphy.com/v1/gifs/search?api_key=${GIPHY_API_KEY}&q=${encodeURIComponent(query)}&limit=20&rating=g`;
        const response = await fetch(url);
        const data = await response.json();
        return data.data.map((gif) => gif.images.fixed_height_small.url);
      }

        document.getElementById("newChapterBtn").onclick = () =>
          document.getElementById("chapterModal").classList.remove("hidden");
        document.getElementById("postChapterBtn").onclick =
          postChapterWithLoading;
        document.getElementById("closeChapterModal").onclick = () =>
          closeModal("chapterModal");
        document.getElementById("closeChatBtn").onclick = closeChat;
        const sendBtn = document.getElementById("sendMsgBtn");
        if (sendBtn) sendBtn.onclick = sendMessageWithLoading;
        document.getElementById("messageInput").onkeypress = (e) => {
          if (e.key === "Enter") sendMessageWithLoading();
        };
        document.getElementById("tagBtn").onclick = (e) => {
          e.stopPropagation();
          showTagPopup();
        };
        document.getElementById("groupPicFile").onchange = function (e) {
          if (e.target.files && e.target.files[0]) {
            const reader = new FileReader();
            reader.onload = (ev) => {
              const preview = document.getElementById("groupPicPreview");
              preview.innerHTML = "";
              preview.style.backgroundImage = `url(${ev.target.result})`;
              preview.style.backgroundSize = "cover";
            };
            reader.readAsDataURL(e.target.files[0]);
          }
        };
        document.getElementById("hubPicFile").onchange = function (e) {
          if (e.target.files && e.target.files[0]) {
            const reader = new FileReader();
            reader.onload = (ev) => {
              const preview = document.getElementById("hubPicPreview");
              preview.innerHTML = "";
              preview.style.backgroundImage = `url(${ev.target.result})`;
              preview.style.backgroundSize = "cover";
            };
            reader.readAsDataURL(e.target.files[0]);
          }
        };
        document.getElementById("loginBtn").onclick = doLogin;
        document.getElementById("signupBtn").onclick = doSignup;
        document.getElementById("showSignupLink").onclick = () => {
          document.getElementById("loginModal").classList.add("hidden");
          document.getElementById("signupModal").classList.remove("hidden");
        };
        document.getElementById("showLoginLink").onclick = () => {
          document.getElementById("signupModal").classList.add("hidden");
          document.getElementById("loginModal").classList.remove("hidden");
        };
        window.closeChat = closeChat;
        const logoutBtn = document.getElementById("logoutBtn");
        if (logoutBtn) logoutBtn.onclick = () => logout();
        window.showImagePreview = (url) => {
          const modal = document.createElement("div");
          modal.style.position = "fixed";
          modal.style.top = 0;
          modal.style.left = 0;
          modal.style.width = "100%";
          modal.style.height = "100%";
          modal.style.background = "rgba(0,0,0,0.95)";
          modal.style.zIndex = 1000;
          modal.style.display = "flex";
          modal.style.alignItems = "center";
          modal.style.justifyContent = "center";
          modal.onclick = () => modal.remove();
          const img = document.createElement("img");
          img.src = url;
          img.style.maxWidth = "90%";
          img.style.maxHeight = "90%";
          img.style.borderRadius = "20px";
          modal.appendChild(img);
          document.body.appendChild(modal);
        };
        auth.onAuthStateChanged(async (user) => {
          if (user) {
            const email = user.email;
            const username = email.replace("@chatrix.local", "");
            await loadCurrentUserData(username);
            document.getElementById("loginModal").classList.add("hidden");
            startRealtimeListeners();
            updateAvatar();
            showScreen("chats");
            deleteOldChapters();
          } else {
            document.getElementById("loginModal").classList.remove("hidden");
          }
        });
      });
    </script>
  </body>
</html>
